<!doctype html>
<!-- 매일매일 수학 · ver 56 · 이 파일은 build.py가 src/ 에서 자동 생성합니다. 직접 수정하지 말 것 -->
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>매일매일 수학</title>
<!-- PWA(온라인 배포판에서만 유효 — file:// 로컬 실행 시 404 무해) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0288D1">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* 학습지 인쇄용 폰트(나눔스퀘어네오) — 인터넷이 없으면 PC에 설치된 폰트/맑은고딕으로 대체됨 */
@import url("https://hangeul.pstatic.net/hangeul_static/css/nanum-square-neo.css");

/* ===== 공통 디자인 토큰 (교육앱_공통스타일 기반 · 진한 하늘색 테마) ===== */
:root{
  /* 기본 폰트 = 나눔스퀘어네오(첫 줄 @import 웹폰트, 인쇄와 동일) — 오프라인이면 맑은 고딕 대체 */
  --font-main:'NanumSquareNeo','NanumSquare Neo','NanumSquareNeoOTF','Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  /* 버튼용: 같은 스택 + 축소 이모지(BtnEmoji) — 이모지가 줄 높이를 못 키우게 해 한글이 항상 가운데 */
  --font-btn:'NanumSquareNeo','NanumSquare Neo','NanumSquareNeoOTF','Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR','BtnEmoji',sans-serif;
  --ink:#2D3436; --ink-soft:#777;
  --accent:#64B5F6; --accent-strong:#1E88E5; --accent-shadow:#1565C0;
  --ok:#2E7D32; --ok-bg:#E8F5E9; --no:#C62828; --no-bg:#FDECEA;
  --choice-bg:#F2FAFF; --choice-border:#90CAF9;
  --card-bg:#FFFFFF; --page-bg:#1b1b1f;
  --teal:#26A69A; --amber:#FFB300;
  --r-card:1.4rem; --r-btn:1.3rem; --r-pill:1rem;
  --shadow-card:0 6px 18px rgba(0,0,0,.12); --shadow-btn:0 5px 0;
  --stage-w:1280px; --stage-h:720px;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
/* 버튼 속 이모지 정렬: 이모지 글리프가 한글보다 커서 줄 높이를 키우면 한글이 아래로 밀림
   → 이모지 폰트만 축소(size-adjust)해 모든 버튼에서 한글이 이모지 유무와 무관하게 가운데 오도록 */
@font-face{ font-family:'BtnEmoji'; src:local('Segoe UI Emoji'), local('Apple Color Emoji'), local('Noto Color Emoji'); size-adjust:78%; }
html,body{ margin:0; padding:0; height:100%; }
body{ font-family:var(--font-main); color:var(--ink); background:var(--page-bg); overflow:hidden; }

#stage{ position:absolute; top:0; left:0; width:var(--stage-w); height:var(--stage-h); transform-origin:top left;
  background:var(--card-bg); display:flex; flex-direction:column; overflow:hidden; box-shadow:0 0 40px rgba(0,0,0,.4); }

/* ===== 상단 메뉴 ===== */
.nav{ flex:0 0 auto; z-index:50; display:flex; gap:.5rem; justify-content:center; align-items:center; flex-wrap:wrap;
  padding:.5rem; background:#fff; border-bottom:4px solid #fff; min-height:54px; }
.nav button{ font-family:inherit; cursor:pointer; border:none; border-radius:var(--r-pill); padding:.45rem .9rem;
  font-size:1.15rem; font-weight:800; color:#fff; display:flex; align-items:center; gap:.3rem;
  box-shadow:0 3px 0 rgba(0,0,0,.18); transition:transform .08s; }
.nav button:active{ transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.18); }
.nav .home{ background:#42A5F5; } .nav .retry{ background:#66BB6A; } .nav .prev{ background:#78909C; }
.nav .next{ background:var(--accent-strong); } .nav .mode{ background:#26A69A; } .nav .set{ background:#7E57C2; }
.nav .full{ background:#5C6BC0; } .nav .quit{ background:#EF5350; } .nav .lvl{ background:#00897B; }
.nav .brand{ background:none; color:var(--accent-strong); font-size:1.4rem; box-shadow:none; cursor:default; }
.syncbadge{ font-size:.9rem; color:#B26A00; font-weight:800; }
/* 학습 화면: 왼쪽 학생 이름, 오른쪽 버튼 (margin-right:auto가 뒤 버튼들을 오른쪽으로 밀어냄) */
.nav-student{ display:flex; align-items:center; gap:.35rem; margin-right:auto; padding-left:.5rem;
  font-size:1.3rem; font-weight:800; color:var(--accent-strong); white-space:nowrap; }

.wrap{ flex:1 1 auto; min-height:0; width:100%; max-width:1240px; margin:0 auto;
  padding:.5rem clamp(.8rem,2vw,1.6rem); overflow:auto; display:flex; flex-direction:column; justify-content:center; }

.card{ background:var(--card-bg); border-radius:var(--r-card); padding:clamp(.9rem,2.2vw,1.4rem);
  border:2px solid #F1E7D2; box-shadow:var(--shadow-card); margin-bottom:.6rem; text-align:center; }
.card--accent{ border:6px solid var(--accent); }
.counter{ display:inline-block; background:var(--accent); color:#fff; border-radius:var(--r-pill);
  padding:.2rem .9rem; font-size:1.1rem; font-weight:700; margin-bottom:.4rem; }
.read-sentence{ font-size:1.6rem; font-weight:700; line-height:1.5; word-break:keep-all; }
.sub{ font-size:1.2rem; color:var(--ink-soft); margin-top:.2rem; }
.speak-icon{ cursor:pointer; }
.dim{ color:var(--ink-soft); font-size:.88rem; }
.ver{ text-align:center; color:var(--ink-soft); font-size:.8rem; margin-top:1rem; opacity:.7; }
.hidden{ display:none !important; }

/* ===== 버튼 ===== */
.btn{ font-family:inherit; cursor:pointer; border:none; color:#fff; border-radius:var(--r-btn); padding:.8rem 2rem;
  font-size:1.5rem; font-weight:400; display:inline-flex; align-items:center; justify-content:center; gap:.5rem; transition:transform .08s; text-decoration:none; }
.btn:active{ transform:translateY(2px); }
.btn--orange{ background:var(--accent-strong); box-shadow:var(--shadow-btn) var(--accent-shadow); }
.btn--green{ background:#2E7D32; box-shadow:var(--shadow-btn) #1B5E20; }
.btn--purple{ background:#7E57C2; box-shadow:var(--shadow-btn) #4527A0; }
.btn--teal{ background:var(--teal); box-shadow:var(--shadow-btn) #00695C; }
.btn--gray{ background:#90A4AE; box-shadow:var(--shadow-btn) #546E7A; }
.btn-sm{ font-size:1rem; padding:.35rem .9rem; box-shadow:0 3px 0 rgba(0,0,0,.18); border-radius:.8rem; }
.btn-choice{ font-family:inherit; cursor:pointer; background:var(--choice-bg); border:5px solid var(--choice-border);
  border-radius:1.1rem; padding:.5rem 1rem; font-weight:700; color:var(--ink); min-width:120px; transition:transform .08s; }
.btn-choice:active{ transform:scale(.96); }
.btn-choice.correct{ background:var(--ok-bg); border-color:var(--ok); }
.btn-choice.wrong{ background:var(--no-bg); border-color:var(--no); opacity:.6; }
.choice-row{ display:flex; flex-wrap:wrap; justify-content:center; gap:1rem; margin-top:1rem; }

/* ===== 학생 이름 선택 ===== */
.name-grid{ display:flex; flex-wrap:wrap; justify-content:center; gap:.9rem; margin-top:1rem; }
.btn-name{ font-family:inherit; cursor:pointer; background:var(--choice-bg); border:5px solid var(--choice-border);
  border-radius:1.2rem; padding:.9rem 1.6rem; min-width:170px; display:flex; flex-direction:column; align-items:center; gap:.15rem;
  transition:transform .08s; }
.btn-name:active{ transform:scale(.96); }
.btn-name .nm{ font-size:1.9rem; font-weight:800; color:var(--ink); }
.btn-name .tg{ font-size:1rem; color:var(--ink-soft); }
.btn-name .ok{ font-size:.95rem; color:var(--ok); font-weight:800; }
.btn-name.done{ border-color:var(--teal); background:#E9F7F5; }

/* ===== 학습 화면 배치 — 카드가 무대를 채우고, 수식 영역이 남는 공간을 모두 차지 ===== */
.study{ width:100%; max-width:1120px; margin:0 auto; flex:1; display:flex; flex-direction:column; min-height:0; }
.study-card{ flex:1; display:flex; flex-direction:column; min-height:0; padding:1rem 2rem 1.3rem; }
.study-card .qface{ flex:1; align-items:flex-start; padding-top:4.4rem; }   /* 수식 위치 고정(힌트가 생겨도 안 움직임) */
.study-card .qface:has(.facev){ padding-top:2.9rem; }
.study-card .qface:has(.early){ padding-top:.2rem; align-items:center; }   /* 기초 화면: 고정 패딩 없이 세로 중앙 — 큰 요소가 무대 안에 들어오게 */                        /* 세로셈은 키가 커서 조금만 아래로 */
.study .choice-row{ gap:1.6rem; margin-top:1rem; }
.study .btn-choice{ min-width:150px; padding:.55rem 1.3rem; }
.study .hint .tip{ font-size:1.25rem; }

/* ===== 문제 얼굴(가로·세로 공통 토큰) ===== */
.qface{ position:relative; display:flex; align-items:center; justify-content:center; min-height:200px; font-weight:700; line-height:1; }
.study.sz-sm .qface{ font-size:3.2rem; } .study.sz-md .qface{ font-size:4.4rem; } .study.sz-lg .qface{ font-size:5.2rem; }
.study.sz-sm .btn-choice{ font-size:2.1rem; } .study.sz-md .btn-choice{ font-size:2.8rem; } .study.sz-lg .btn-choice{ font-size:3.2rem; }
.qblank{ color:var(--accent-strong); border:4px dashed var(--accent); border-radius:.3em; padding:0 .35em; min-width:1.7em;
  display:inline-flex; align-items:center; justify-content:center; }
.qblank.answered{ border-color:transparent; color:#E53935; animation:slotPop .5s cubic-bezier(.2,1.5,.4,1); }
@keyframes slotPop{ 0%{ transform:scale(.4); } 60%{ transform:scale(1.25); } 100%{ transform:scale(1); } }
/* 가로셈 */
.faceh{ display:flex; align-items:flex-start; justify-content:center; gap:.32em; }
.faceh .opcol{ display:flex; flex-direction:column; align-items:center; gap:.28em; position:relative; }
/* 힌트 동그라미는 숫자 아래 '매달림'(절대배치) — 수식 간격·위치에 영향 없음 */
.faceh .opcol > .cstack{ position:absolute; top:calc(100% + .18em); left:50%; transform:translateX(-50%); }
.faceh .fsign{ color:var(--accent-strong); }
.faceh .fnum{ display:inline-flex; }
.hd{ font-style:normal; position:relative; display:inline-block; border-radius:.12em; margin:0 .06em; }   /* 숫자 간 간격 +20% */
/* 가로셈 자리값 색 띠(일=파랑·십=초록·백=보라·천=주황) */
/* 자리 색 약속: 일=빨강, 십=파랑, 백=초록, 천=주황 */
.faceh.pv .fnum .hd:nth-last-child(1){ background:#FDECEA; }
.faceh.pv .fnum .hd:nth-last-child(2){ background:#E3F2FD; }
.faceh.pv .fnum .hd:nth-last-child(3){ background:#E8F5E9; }
.faceh.pv .fnum .hd:nth-last-child(4){ background:#FFF3E0; }
/* 가로셈 정답 자릿값 칸 */
.qblank-cells{ border:none; padding:0; min-width:auto; gap:.12em; }
.qblank-cells .ansbox{ min-width:.72em; min-height:1.15em; border:.06em dashed var(--accent); border-radius:.14em; color:#E53935; box-sizing:border-box; text-align:center; }
.qblank-cells .ansbox.filled{ border-style:solid; border-color:transparent; }
/* 세로셈 */
.facev{ display:inline-flex; flex-direction:column; gap:.06em; }
.vrow{ display:flex; align-items:center; justify-content:flex-end; gap:.18em; position:relative; }
.vop{ width:.7em; text-align:center; color:var(--accent-strong); }
.vnum{ display:inline-flex; justify-content:flex-end; }
.vd{ font-style:normal; display:inline-block; width:.8em; text-align:center; }   /* 숫자 간 간격 +20% */
.vbar{ height:.16em; background:var(--ink); border-radius:3px; margin-right:-.2em; }
.vside-c{ position:absolute; left:100%; top:50%; transform:translateY(-50%); margin-left:.5em; }
.vans{ display:inline-flex; align-items:center; justify-content:center; min-height:1.3em; padding:.04em .15em; margin-right:-.21em;
  border-width:.06em; border-radius:.2em; box-sizing:border-box; min-width:1.2em; }
/* 정답이 채워지면 일의 자리(오른쪽) 기준으로 자릿수 칸 정렬 */
.vans.answered{ justify-content:flex-end; }

/* ===== 힌트(동그라미·텐프레임) ===== */
.hint{ margin-top:.4rem; }
.hint .tip{ font-size:1.1rem; color:var(--ink-soft); margin-bottom:.3rem; line-height:1.45; }
/* 입체 유리구슬 느낌: 좌상단 하이라이트 + 아래 그림자 + 안쪽 명암 */
.cdot{ position:relative; width:30px; height:30px; border-radius:50%;
  background-color:var(--accent-strong);
  background-image:radial-gradient(circle at 32% 27%, rgba(255,255,255,.92), rgba(255,255,255,.15) 40%, rgba(0,0,0,.18) 100%);
  box-shadow:0 3px 4px rgba(0,0,0,.28), inset 0 -3px 5px rgba(0,0,0,.24), inset 0 2px 3px rgba(255,255,255,.45);
  transition:transform .3s, opacity .3s; }
.cdot.b{ background-color:var(--amber); }
.cdot.sky{ background-color:#4FC3F7; }
.cdot.gray{ background-color:#DADADA; background-image:none; box-shadow:inset 0 -2px 3px rgba(0,0,0,.12); }
.cdot.slash::after{ content:''; position:absolute; left:50%; top:50%; width:150%; height:6px; background:#3a3a3a;
  border-radius:3px; transform:translate(-50%,-50%) rotate(-45deg); transform-origin:center; animation:slashIn .25s ease; }
@keyframes slashIn{ from{ width:0; opacity:0; } to{ width:150%; opacity:1; } }
.cstack{ position:relative; display:inline-flex; flex-direction:column; gap:5px; vertical-align:middle; }
.crow5{ display:flex; gap:5px; }
.cstack .cdot{ width:26px; height:26px;
  box-shadow:0 2px 3px rgba(0,0,0,.22), inset 0 -2px 3px rgba(0,0,0,.22), inset 0 1px 2px rgba(255,255,255,.45); }
.cstack .cdot.gray{ box-shadow:inset 0 -1px 2px rgba(0,0,0,.1); }
.cstack .cdot.slash::after{ height:5px; }
/* 이어 세기 시작 표시: 앞 숫자에 펜으로 친 듯한 동그라미 */
.oring{ position:relative; }
.oring::after{ content:''; position:absolute; inset:-.16em -.36em; border:.08em solid #E53935; border-radius:50%;
  animation:oringIn .4s cubic-bezier(.2,1.35,.4,1); pointer-events:none; }
@keyframes oringIn{ 0%{ transform:scale(.4); opacity:0; } 100%{ transform:scale(1); opacity:1; } }

/* 한 자리 덧셈·뺄셈: 숫자 아래 동그라미 합치기/지우기 */
.cdot.rm{ background-color:#EF6C60; }
.cdot.red{ background-color:#E53935; }   /* 일의 자리(자리 색 약속) */
/* 10 묶음: 테두리 대신 옅은 배경(앞 두 줄=10) + 작은 라벨 */
.cstack.tenfill .crow5:nth-child(-n+2){ background:rgba(38,166,154,.18); border-radius:.55rem;
  box-shadow:0 0 0 5px rgba(38,166,154,.18); }
.tenlab{ position:absolute; left:-2.3rem; top:.45rem; background:var(--teal); color:#fff;
  font-size:.85rem; font-weight:800; padding:.04rem .5rem; border-radius:.55rem; z-index:2; }
/* 텐프레임 (10의 보수 3형제 공통 · 작은 크기) */
.tenframe{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; max-width:280px; margin:.3rem auto; }
.tenframe.tf-sm{ max-width:140px; gap:3px; }
.tf{ aspect-ratio:1; border-radius:50%; border:3px solid var(--accent);
  display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; line-height:1; }
.tenframe.tf-sm .tf{ border-width:2px; font-size:.9rem; }
.tf.fill{ background:var(--teal); border-color:var(--teal); }
.tf.need{ background:var(--accent-strong); border-color:var(--accent-strong); }
.tf.need.rm{ background:#EF6C00; border-color:#EF6C00; position:relative; }
.tf.need.rm::after{ content:''; position:absolute; left:50%; top:50%; width:130%; height:3px; background:#3a3a3a;
  border-radius:2px; transform:translate(-50%,-50%) rotate(-45deg); }
.tf.rm-line{ border-style:dashed; border-color:#EF6C00; }
.tf.fill.rm-line{ border-color:#EF6C00; }   /* 채워진 상태에서 지워질 곳 표시(18단계 1차) */

/* ===== 십 막대·낱개 (수 모형: 막대=10, 동그라미=1) ===== */
.pvrow{ display:flex; justify-content:center; align-items:flex-end; gap:1.1rem; flex-wrap:wrap; margin:.3rem 0; }
.pvset{ display:flex; align-items:flex-end; gap:.7rem; }
.rodwrap,.unitwrap{ display:flex; flex-direction:column; align-items:center; gap:.2rem; }
.rodlbl{ font-size:.85rem; font-weight:800; color:var(--ink-soft); }
.rodrow{ display:flex; gap:6px; align-items:flex-end; min-height:20px; }
/* 입체 십 막대: 눈금 줄무늬 + 좌측 하이라이트/우측 음영 + 그림자 */
.rod{ position:relative; width:17px; height:92px; border-radius:5px; background-color:var(--accent-strong);
  background-image:repeating-linear-gradient(to bottom, transparent 0 8.2px, rgba(255,255,255,.5) 8.2px 9.2px),
                   linear-gradient(90deg, rgba(255,255,255,.55), rgba(255,255,255,.08) 45%, rgba(0,0,0,.22) 100%);
  box-shadow:0 3px 4px rgba(0,0,0,.28), inset 0 -3px 4px rgba(0,0,0,.22), inset 0 2px 2px rgba(255,255,255,.35); }
.rod.b{ background-color:var(--amber); }
.rod.sky{ background-color:#4FC3F7; }
.rod.gray{ background-color:#DADADA; background-image:repeating-linear-gradient(to bottom, transparent 0 8.2px, rgba(255,255,255,.5) 8.2px 9.2px); box-shadow:inset 0 -2px 3px rgba(0,0,0,.12); }
.rod.slash::after{ content:''; position:absolute; left:50%; top:50%; width:210%; height:6px; background:#3a3a3a;
  border-radius:3px; transform:translate(-50%,-50%) rotate(-62deg); animation:slashIn .25s ease; }
.rod.new{ animation:popIn .55s cubic-bezier(.2,1.5,.4,1); }
.rod.melt{ animation:fadeShrink .6s ease forwards; }
.cdot.fuse{ animation:fadeShrink .5s ease forwards; }
.cdot.born{ animation:popIn .45s cubic-bezier(.2,1.5,.4,1); }
@keyframes popIn{ 0%{ transform:scale(0); } 70%{ transform:scale(1.3); } 100%{ transform:scale(1); } }
@keyframes fadeShrink{ to{ transform:scale(.12); opacity:0; } }

/* ===== 두 자리: 숫자 아래 매달린 미니 수 모형(막대=십·왼쪽, 낱개=일·오른쪽 — 자리 글자 순서와 일치) ===== */
.hangmodel{ display:flex; align-items:flex-end; gap:.5rem; }
.faceh .opcol > .hangmodel{ position:absolute; top:calc(100% + .22em); left:50%; transform:translateX(-50%); }
.hangmodel .rodrow{ display:flex; gap:4px; align-items:flex-end; }
.hangmodel .rod{ width:11px; height:56px; border-radius:3px; }
.hangmodel .cstack{ gap:4px; }
.hangmodel .crow5{ gap:4px; }
.hangmodel .cdot{ width:18px; height:18px; }
/* 겹침 시 축소판 — transform 아닌 레이아웃 축소(flyMove/flyKill 좌표 보정 유지) */
.hangmodel.compact{ gap:.3rem; }
.hangmodel.compact .rod{ width:8px; height:44px; }
.hangmodel.compact .cdot{ width:13px; height:13px; }
.hangmodel.compact .rodrow, .hangmodel.compact .crow5{ gap:3px; }
/* 한 자리·십몇 힌트(combineAdd/Sub): 문제 화면 동그라미(.cstack .cdot 26px)와 같은 크기 — 힌트로 넘어갈 때 작아지지 않게 */
.hangmodel.big .cdot{ width:26px; height:26px; }
.hangmodel.big .rod{ width:15px; height:78px; border-radius:4px; }
.hangmodel.big .rodrow, .hangmodel.big .cstack, .hangmodel.big .crow5{ gap:5px; }
.hangmodel.big.compact .cdot{ width:20px; height:20px; }
.hangmodel.big.compact .rod{ width:11px; height:60px; }
/* 빼는 수(뒷수) 모형: 빗금 단서만(테두리 없음) — 자리 색 약속 유지하면서 "없어질 쪽" 구분 */
.sub-src .rod, .sub-src .cdot, .sub-src .bunit, .sub-src .brod, .sub-src .bflat{
  background-image:repeating-linear-gradient(45deg, rgba(255,255,255,.8) 0 2px, transparent 2px 6px) !important; }
/* 받아올림: '10'에서 십의 자리로 날아가는 작은 1 */
.flyone{ position:absolute; left:50%; top:-.2em; font-size:1.15rem; font-weight:800; color:#E53935; z-index:3; }

/* ===== 두 자리: 한 줄 배치 — 십 칸(파랑)·일 칸(빨강) 같은 자리끼리 + 진행 카운터 ===== */
.pvwrap{ display:flex; align-items:center; justify-content:center; gap:1.6rem; flex-wrap:wrap; margin:.25rem 0; }
.pvline{ display:flex; align-items:stretch; gap:1.1rem; }
.pvcell{ border-radius:.85rem; padding:.4rem .7rem .5rem; display:flex; flex-direction:column; align-items:center;
  justify-content:flex-end; gap:.3rem; min-width:80px; }
.pvcell.tens{ background:#E3F2FD; }
.pvcell.ones{ background:#FDECEA; }
.pvvals{ display:flex; align-items:center; gap:.3rem; }
.bplus{ font-weight:800; color:var(--ink-soft); }
.bminus{ font-weight:800; color:#C62828; }
.pvgap{ width:16px; flex:0 0 16px; }
.dotpair{ display:flex; align-items:flex-end; }
.will-rm{ outline:3px dashed #E53935; outline-offset:2px; }
.pvcounter{ font-size:3rem; font-weight:900; color:var(--accent-strong); min-width:2.4em; text-align:center;
  background:var(--choice-bg); border:5px solid var(--choice-border); border-radius:1.1rem; padding:.15rem .5rem; align-self:center; }

/* ===== 수 모형 블록 (백판·십막대·낱개) ===== */
.blockrow{ display:flex; justify-content:center; align-items:flex-end; gap:1.4rem; flex-wrap:wrap; margin:.2rem 0; }
.bset{ display:flex; flex-direction:column; align-items:center; gap:.35rem; }
.bnum{ font-size:1.5rem; font-weight:800; color:var(--accent-strong); }
.bnum.b{ color:#B26A00; } .bnum.sky{ color:#0277BD; }
.brow{ display:flex; align-items:flex-end; gap:.55rem; }
.bcol{ display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:.25rem; min-width:34px; }
.bval{ font-size:1.05rem; font-weight:800; color:var(--accent-strong); }
.bval.ph{ color:#2E7D32; } .bval.pt{ color:#1565C0; } .bval.po{ color:#C62828; }   /* 백=초록 십=파랑 일=빨강 */
.blbl{ font-size:.82rem; font-weight:800; color:var(--ink-soft); }
.bstack{ display:flex; align-items:flex-end; justify-content:center; }
.bflats{ flex-wrap:wrap; gap:4px; max-width:104px; }        /* 백판: 3개씩 줄바꿈 */
.brods{ gap:4px; }
.bunits{ flex-direction:column-reverse; gap:3px; flex-wrap:wrap-reverse; max-height:102px; align-items:flex-end; }  /* 낱개: 아래부터, 9개 넘으면(빌림 +10) 옆 줄로 */
/* 이어 세기 애니메이션용 — 변신/소멸/등장 (hangmodel의 .fuse/.melt/.born 문법을 블록에도) */
.brod.melt,.bflat.melt{ animation:fadeShrink .6s ease forwards; }
.bunit.born,.brod.born{ animation:popIn .45s cubic-bezier(.2,1.5,.4,1); }
.brod.new,.bflat.new{ animation:popIn .55s cubic-bezier(.2,1.5,.4,1); }
.bunit.fuse,.brod.fuse{ animation:fadeShrink .5s ease forwards; }
.bflat{ width:30px; height:30px; border-radius:3px; background-color:#43A047;   /* 백=초록 */
  background-image:repeating-linear-gradient(0deg,transparent 0 5.4px,rgba(255,255,255,.55) 5.4px 6.4px),
                   repeating-linear-gradient(90deg,transparent 0 5.4px,rgba(255,255,255,.55) 5.4px 6.4px),
                   linear-gradient(135deg, rgba(255,255,255,.4), rgba(0,0,0,.15));
  box-shadow:0 2px 3px rgba(0,0,0,.25), inset 0 -2px 2px rgba(0,0,0,.15); }
.brod{ width:8px; height:30px; border-radius:2px; background-color:var(--accent-strong);
  background-image:repeating-linear-gradient(0deg,transparent 0 5.4px,rgba(255,255,255,.5) 5.4px 6.4px),
                   linear-gradient(90deg, rgba(255,255,255,.5), rgba(0,0,0,.18));
  box-shadow:0 2px 3px rgba(0,0,0,.25); }
.bunit{ width:8px; height:8px; border-radius:2px; background-color:#E53935;   /* 일=빨강 */
  background-image:linear-gradient(135deg, rgba(255,255,255,.5), rgba(0,0,0,.18));
  box-shadow:0 1px 2px rgba(0,0,0,.25); }
.bsign{ font-size:2rem; font-weight:800; color:var(--accent-strong); align-self:center; }

/* ===== 세 자리 자리값 색 띠 (자리 색 약속: 일=빨강·십=파랑·백=초록·천=주황) ===== */
.vd{ position:relative; border-radius:.12em; flex:0 0 auto; }
.facev.pv .vnum .vd:nth-last-child(1){ background:#FDECEA; }
.facev.pv .vnum .vd:nth-last-child(2){ background:#E3F2FD; }
.facev.pv .vnum .vd:nth-last-child(3){ background:#E8F5E9; }
.facev.pv .vnum .vd:nth-last-child(4){ background:#FFF3E0; }
.vd.cur, .hd.cur{ box-shadow:inset 0 0 0 4px var(--accent-strong); }
.ansbox.cur{ box-shadow:0 0 0 4px var(--amber); }
/* 자리별 하이라이트(현재 계산 중인 자리만 채움색 — 일=빨강·십=파랑·백=초록·천=주황, 테두리 없음) */
.cur.curp0, .ansbox.cur.curp0{ background:#FDECEA !important; box-shadow:none; }
.cur.curp1, .ansbox.cur.curp1{ background:#E3F2FD !important; box-shadow:none; }
.cur.curp2, .ansbox.cur.curp2{ background:#E8F5E9 !important; box-shadow:none; }
.cur.curp3, .ansbox.cur.curp3{ background:#FFF3E0 !important; box-shadow:none; }
/* 자릿값 아이콘 — 가로셈: 정답 칸 위 / 세로셈: 맨 위 숫자 열 위 */
.pvicon{ position:absolute; left:50%; bottom:calc(100% + .1em); transform:translateX(-50%);
  display:flex; pointer-events:none; }
.facev .pvicon{ bottom:calc(100% + 4px); }    /* 숫자 바로 위(글자 크기와 무관한 고정 간격) */
.pvicon .rod{ width:8px; height:30px; border-radius:2.5px; }
.pvicon .cdot{ width:14px; height:14px; }
.pvicon .bflat{ width:18px; height:18px; }
/* 자리별 입력 패널 제목 앞 작은 자릿값 아이콘 */
.pvinline{ display:inline-flex; align-items:center; margin-right:.35em; vertical-align:-2px; }
.pvinline .rod{ width:7px; height:24px; border-radius:2px; }
.pvinline .cdot{ width:13px; height:13px; }
.pvinline .bflat{ width:16px; height:16px; }
/* 정답 자릿값 칸(빈 상자 → 자리별 채움) */
.vans-cells{ display:inline-flex; justify-content:flex-end; margin-right:0; padding:0; min-width:auto; }
.vans-cells .ansbox{ min-height:1.15em; border:.06em dashed var(--accent); border-radius:.14em; color:#E53935; box-sizing:border-box; }
.vans-cells .ansbox.filled{ border-style:solid; border-color:transparent; }
/* 세 자리 덧셈 자리별 직접 입력 패널(식 오른쪽) */
.colside{ position:absolute; right:2%; top:50%; transform:translateY(-50%); z-index:3;
  background:#fff; border:4px solid var(--accent); border-radius:1rem; padding:.8rem 1rem;
  box-shadow:0 8px 22px rgba(0,0,0,.16); text-align:center; }
.colside .colnm{ font-size:1.1rem; font-weight:800; color:var(--accent-strong); margin-bottom:.3rem; }
.coleq{ font-size:1.9rem; font-weight:800; display:flex; align-items:center; justify-content:center; gap:.35rem; white-space:nowrap; }
.c-carry{ color:#E53935; }
.colnm{ font-size:1.1rem; font-weight:800; color:var(--accent-strong); margin-bottom:.3rem; }
.colinput{ width:2.2em; font-family:inherit; font-size:1.8rem; font-weight:800; text-align:center;
  border:4px solid var(--choice-border); border-radius:.5rem; background:var(--choice-bg); color:var(--accent-strong);
  padding:.1em .1em; outline:none; }
.colinput:focus{ border-color:var(--accent-strong); background:#fff; }
.colok{ margin-top:.7rem; font-size:1.15rem; padding:.5rem 1.4rem; }
/* 가로셈: 문제 아래 자리별 덧셈 패널 */
.colbelow{ display:inline-flex; flex-direction:column; align-items:center; gap:.2rem;
  background:#fff; border:4px solid var(--accent); border-radius:1rem; padding:.6rem 1.4rem; margin:.2rem auto .4rem;
  box-shadow:0 6px 18px rgba(0,0,0,.12); animation:gboxIn .28s cubic-bezier(.2,1.4,.4,1); }
.colbelow .colok{ margin-top:.4rem; }
.cmark::after{ content:'1'; position:absolute; left:50%; top:-.75em; transform:translateX(-50%);
  font-size:.42em; font-weight:800; color:#E53935; }
.bmark::after{ content:'10'; position:absolute; left:50%; top:-.75em; transform:translateX(-50%);
  font-size:.42em; font-weight:800; color:#E53935; }
/* 받아내림 표준 표기: 빌려준 윗자리 — 원래 수 빗금 + 위에 줄어든 수(data-bnew) */
.bstrike::before{ content:''; position:absolute; left:12%; right:12%; top:52%; height:.07em;
  background:#E53935; border-radius:1px; transform:rotate(-20deg); }
.bstrike::after, .bstrike.bmark::after{ content:attr(data-bnew); position:absolute; left:50%; top:-.75em;
  transform:translateX(-50%); font-size:.42em; font-weight:800; color:#E53935; }
.pvchip{ display:inline-block; font-size:.95rem; font-weight:800; border-radius:.5rem; padding:.06rem .55rem; margin-right:.25rem; }
.pvchip.c1{ background:#FDECEA; color:#C62828; } .pvchip.c2{ background:#E3F2FD; color:#1565C0; } .pvchip.c3{ background:#E8F5E9; color:#2E7D32; }
.pvchip.c4{ background:#FFF3E0; color:#E65100; }
.pvicon .pvchip{ margin-right:0; white-space:nowrap; }   /* 숫자·정답칸 위 자릿값 라벨(한글 칩) */

/* ===== 세 수 단계 안내: 먼저 계산할 부분을 '하나의 네모 상자'로 묶음 / 나머지 흐림 / 중간 결과 칩 ===== */
.gbox{ position:absolute; border:5px solid var(--amber); border-radius:1rem; background:rgba(255,179,0,.14);
  pointer-events:none; z-index:2; box-sizing:border-box; animation:gboxIn .28s cubic-bezier(.2,1.4,.4,1); }
@keyframes gboxIn{ 0%{ transform:scale(.86); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
.gdim{ opacity:.32; }
.gres{ display:inline-block; background:var(--ok-bg); color:var(--ok); font-weight:800;
  border-radius:.5rem; padding:.05rem .55rem; margin-right:.4rem; font-size:1.15rem; }

/* ===== 곱셈 자리 분해 카드 ===== */
.msplit{ font-size:1.7rem; font-weight:800; margin:.2rem 0 .4rem; }
.msplit .m1{ background:#E3F2FD; color:#1565C0; border-radius:.5rem; padding:.05em .3em; }   /* 십 부분=파랑 */
.msplit .m2{ background:#FDECEA; color:#C62828; border-radius:.5rem; padding:.05em .3em; }   /* 일 부분=빨강 */

/* ===== 곱셈·나눗셈 힌트 (묶음·뛰어세기) ===== */
.mulrow{ display:flex; justify-content:center; align-items:flex-start; gap:.7rem; flex-wrap:wrap; margin:.3rem 0; }
.mgrp,.dgrp{ border:3px dashed #c9c9c9; border-radius:.8rem; padding:.4rem .5rem; transition:border-color .3s, background .3s; }
.dgrp.on{ border-color:var(--accent-strong); border-style:solid; background:var(--choice-bg); }
.skiprow{ display:flex; justify-content:center; gap:.55rem; flex-wrap:wrap; margin:.3rem 0; }
.skipbox{ min-width:2.1em; padding:.15em .35em; border:4px solid var(--choice-border); border-radius:.6em;
  font-size:1.7rem; font-weight:800; color:var(--accent-strong); background:var(--choice-bg);
  display:inline-flex; align-items:center; justify-content:center; transition:border-color .3s; }
.skipbox.on{ border-color:var(--accent-strong); background:#fff; }

/* ===== 정답 반응(별가루) ===== */
.spark{ position:absolute; z-index:90; font-size:1.7rem; pointer-events:none; transform:translate(-50%,-50%); }

/* ===== 입력·표(대시보드) ===== */
label{ display:block; font-weight:700; font-size:1.1rem; margin:.8rem 0 .3rem; text-align:left; }
input[type=text],input[type=password],select{ width:100%; font-family:inherit; font-size:1.4rem; padding:.6rem .9rem;
  border-radius:.9rem; border:3px solid var(--choice-border); background:var(--choice-bg); color:var(--ink); outline:none; }
input:focus,select:focus{ border-color:var(--accent-strong); background:#fff; }
.frow{ display:flex; gap:.8rem; } .frow>*{ flex:1; }
table{ width:100%; border-collapse:collapse; font-size:1.05rem; }
th,td{ padding:.5rem .5rem; border-bottom:1px solid #EFE2C6; text-align:left; vertical-align:middle; }
th{ color:var(--ink-soft); font-size:.95rem; font-weight:700; }
td select{ font-size:1rem; padding:.3rem .4rem; }
.tag{ display:inline-block; font-size:.9rem; font-weight:800; padding:.15rem .7rem; border-radius:999px; }
.tag.on{ background:var(--ok-bg); color:var(--ok); } .tag.off{ background:#EEE; color:#999; }
.tag.mid{ background:#FFF3DD; color:#B26A00; } .tag.low{ background:var(--no-bg); color:var(--no); }
.mini{ display:inline-flex; gap:3px; } .mini i{ width:10px; height:10px; border-radius:3px; background:#E5DBC4; }
.mini i.on{ background:var(--teal); }
.del{ background:none; border:none; color:#E53935; font-weight:800; cursor:pointer; text-decoration:underline; font-size:.95rem; }
.note{ font-size:1rem; color:var(--ink-soft); background:#FFF7E5; border:1px solid #EFE2C6; border-radius:.8rem; padding:.6rem .8rem; margin-top:.6rem; text-align:left; }
.scroll{ overflow:auto; max-height:300px; }
.statrow{ display:flex; gap:.8rem; align-items:stretch; flex-wrap:wrap; margin-bottom:.8rem; }
.stat{ background:var(--choice-bg); border:2px solid var(--choice-border); border-radius:1rem; padding:.5rem 1.1rem; min-width:130px; }
.stat .k{ font-size:.9rem; color:var(--ink-soft); font-weight:700; }
.stat .v{ font-size:1.5rem; font-weight:800; color:var(--accent-strong); }
.stat .v.code{ letter-spacing:.25em; }
.code-big{ font-size:2.6rem; font-weight:900; letter-spacing:.3em; color:var(--accent-strong); background:var(--choice-bg);
  border:3px dashed var(--accent); border-radius:1rem; padding:.5rem 1rem; margin:.6rem auto; text-align:center; max-width:360px; }
.sess{ border:2px solid #EFE2C6; border-radius:.9rem; padding:.4rem .8rem; margin:.4rem 0; text-align:left; }
.sess summary{ cursor:pointer; font-size:1.05rem; padding:.25rem 0; }
.itemtbl{ margin:.4rem 0 .2rem; font-size:.98rem; }
.itemrow td{ padding:.3rem .5rem; }

/* ===== 달력 ===== */
.cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:10px; max-width:660px; margin:.6rem auto 0; }
.cal-h{ text-align:center; font-weight:700; color:#fff; background:var(--accent-strong); border-radius:.5rem; padding:.3rem 0; font-size:1.15rem; }
.cal-h.sun,.cal-h.sat{ background:#EF5350; }
.cal-d{ position:relative; aspect-ratio:1; display:grid; place-items:center; font-size:1.5rem; border-radius:50%; }
.cal-d .dnum{ position:relative; z-index:1; }
.cal-d.done{ font-weight:800; color:#fff; }
.cal-d.done::after{ content:''; position:absolute; left:50%; top:50%; width:86%; height:86%; transform:translate(-50%,-50%);
  background:var(--teal); border-radius:50%; z-index:0; }
.cal-d.today{ font-weight:900; }
.monthnav{ display:flex; align-items:center; justify-content:center; gap:1rem; margin:.5rem 0; }
.monthnav .mtitle{ font-size:1.4rem; font-weight:800; min-width:150px; }
.mbtn{ font-family:inherit; cursor:pointer; border:none; background:var(--accent-strong); color:#fff;
  border-radius:.8rem; padding:.4rem 1rem; font-size:1.1rem; font-weight:700; box-shadow:0 3px 0 var(--accent-shadow); }
.mbtn:active{ transform:translateY(2px); }
.mbtn.mprev{ background:#90A4AE; box-shadow:0 3px 0 #607D8B; }
.mbtn.mnext{ background:#43A047; box-shadow:0 3px 0 #2E7D32; }

/* ===== 마스코트·칭찬 도장·점수 팝업 ===== */
.mascot-imgs{ display:flex; align-items:center; justify-content:center; gap:1rem; }
.kidface{ width:150px; height:150px; object-fit:cover; border-radius:22px; border:3px solid var(--accent-strong);
  display:block; margin:0 auto; box-shadow:0 4px 12px rgba(0,0,0,.15); }
.mascot-imgs img{ height:130px; }
.praiseimg{ height:160px; }
.cheerstamp{ position:absolute; top:24px; left:calc(100% - 50px); height:240px; transform:rotate(11deg);
  filter:drop-shadow(0 4px 6px rgba(0,0,0,.22)); animation:stampDrop .7s cubic-bezier(.2,1.4,.4,1) both; z-index:5; }
@keyframes stampDrop{ 0%{ transform:rotate(11deg) scale(2.6); opacity:0; }
  55%{ transform:rotate(11deg) scale(.88); opacity:1; }
  75%{ transform:rotate(11deg) scale(1.1); }
  100%{ transform:rotate(11deg) scale(1); } }
.scorepop{ position:absolute; left:50%; top:46%; transform:translate(-50%,-50%); z-index:120; background:#fff;
  border:6px solid var(--accent-strong); border-radius:1.4rem; padding:1rem 1.8rem; box-shadow:0 12px 30px rgba(0,0,0,.25);
  text-align:center; font-weight:800; color:var(--accent-strong); animation:scoreStay 3s ease forwards; pointer-events:none; }
.scorepop .big{ font-size:2.6rem; margin-top:.2rem; }
.scorepop.stay5{ animation-duration:4.8s; }
.scorepop .lvup{ margin-top:.4rem; font-size:1.25rem; color:#E65100; }
@keyframes scoreStay{ 0%{ opacity:0; transform:translate(-50%,-40%) scale(.6); } 10%{ opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  18%{ transform:translate(-50%,-50%) scale(1); } 82%{ opacity:1; } 100%{ opacity:0; transform:translate(-50%,-58%) scale(.95); } }

/* ===== 학습지 출력 (#printsheet — 화면에서는 숨김, 인쇄 시에만 표시) =====
   배열: 5문제=1×5 / 10문제=2×5 / 20문제=2×10(2쪽) — 지면을 90% 가깝게 채우는 크기 */
#printsheet{ display:none; color:#000; margin:0; padding:0;
  font-family:'NanumSquareNeo','NanumSquare Neo','NanumSquareNeoOTF','NanumSquareRound','Malgun Gothic',sans-serif; }
/* 여백은 종이가 아니라 지면(.ws-page padding)이 가짐 — 브라우저 여백과의 반올림 충돌로
   빈 둘째 쪽이 생기는 것을 원천 차단. 인쇄 창 여백은 '기본값' 그대로 두면 됨 */
@page{ size:A4 portrait; margin:0; }
@media print{
  html,body{ overflow:visible !important; height:auto !important; margin:0 !important; background:#fff !important; }
  #stage{ display:none !important; }
  #printsheet{ display:block !important; }
}
/* 페이지: A4 한 장 높이 고정, 문제 영역이 남은 공간을 균등 분배해 지면 끝까지 채움 */
/* 종이(297mm)보다 확실히 작게 + 여백을 padding으로 내장 */
.ws-page{ position:relative; height:288mm; padding:10mm 13mm; box-sizing:border-box;
  display:flex; flex-direction:column; overflow:hidden; }
.ws-page > *{ position:relative; z-index:1; }
.ws-bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0 !important; }
/* 제목 박스 — 일일수학풍: [네이비 로고 블록 | 왼쪽정렬 제목 | 학습일 칸] */
.ws-head{ display:flex; border:0.4mm solid #333; align-items:stretch; margin-bottom:6mm; background:#fff; }
.ws-logo{ width:27mm; background:#fff; color:#2b3947; border-right:0.4mm solid #333;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.5mm; padding:1.5mm 0; }
.ws-logo .t{ font-size:11.5pt; font-weight:900; line-height:1.22; text-align:center; letter-spacing:.04em; }
.ws-logo .u{ font-size:7pt; letter-spacing:.35em; opacity:.65; }
.ws-title{ flex:1; text-align:left; padding:2mm 0 2mm 5mm; display:flex; flex-direction:column; justify-content:center; }
.ws-title .s{ font-size:10pt; color:#777; letter-spacing:.05em; }
.ws-title .b{ font-size:17.5pt; font-weight:800; letter-spacing:.03em; margin-top:.5mm; }
.ws-side{ width:37mm; border-left:0.25mm solid #999; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:1.2mm; padding:1.5mm; }
.ws-side .lbl{ font-size:8.5pt; color:#777; letter-spacing:.25em; }
.ws-side .dt{ font-size:11pt; font-weight:700; }
/* 손으로 쓰는 밑줄 칸 */
.wl{ display:inline-block; border-bottom:0.35mm solid #555; height:1em; vertical-align:bottom; }
.wl.sm{ width:11mm; } .wl.lg{ width:44mm; }
/* 학교·학년·반·이름 줄(오른쪽 정렬) */
.ws-info{ text-align:right; font-size:13pt; font-weight:700; margin:0 1mm 3mm 0; letter-spacing:.02em; }
/* 문제 영역 — 남은 세로 공간 전체를 문제 줄들이 나눠 가짐 */
.ws-problems{ flex:1; display:flex; flex-direction:column; justify-content:space-around; padding:2mm 0 4mm; }
.ws-row{ display:flex; justify-content:space-around; align-items:center;
  break-inside:avoid; page-break-inside:avoid; }
.ws-row.single{ justify-content:center; }
/* 문제 — 일일수학풍: 점선 칸 없이 깔끔한 숫자 + 밑줄, 회색 동그라미 번호 */
.wp{ display:flex; align-items:flex-start; gap:2.5mm; }
.wnum{ font-size:12pt; font-weight:700; color:#999; padding-top:0; }
.wpv{ border-collapse:collapse; width:auto; table-layout:fixed; }
.wpv td{ width:11mm; height:11mm; padding:0; text-align:center; vertical-align:middle;
  font-size:21pt; font-weight:800; border:none; }
.wpv td.op{ width:10mm; font-size:19pt; font-weight:800; }
.wpv td.ans{ height:14mm; }
.wpv td.rule{ border-bottom:0.55mm solid #222; }
/* 빈칸 유형(10의 보수)의 가운데 답 칸만 옅은 안내 상자 */
.wpv td.ans.rule:not(.op){ border:0.3mm dashed #b5b5b5; border-bottom:0.55mm solid #222; }
.wph{ font-size:22pt; font-weight:800; display:flex; align-items:center; gap:3mm; min-width:70mm; }
.wph .bl{ display:inline-block; width:17mm; height:12mm; vertical-align:middle; }   /* 상자 없이 빈 공간(일일수학풍) */
/* 20문제 — 한 장에 들어가도록 축소 (가로셈 2×10, 세로셈 4×5) */
.ws-page.n20.h .wph{ font-size:16pt; min-width:60mm; gap:2.5mm; }
.ws-page.n20.h .wph .bl{ width:13mm; height:9mm; }
.ws-page.n20.h .wnum{ font-size:12pt; padding-top:0; }
.ws-page.n20.v .wpv td{ width:8mm; height:8.5mm; font-size:14pt; }
.ws-page.n20.v .wpv td.op{ width:6.5mm; font-size:12.5pt; }
.ws-page.n20.v .wpv td.ans{ height:10mm; }
.ws-page.n20.v .wnum{ font-size:11.5pt; padding-top:1mm; }
.ws-page.n20.v .ws-row{ justify-content:space-between; padding:0 2mm; }
/* 기초 유형 지필형 칸(세기·담기·모으기·가르기·비교·수열·문장제·채점) */
.wpe{ display:flex; flex-direction:column; gap:2.5mm; min-width:78mm; max-width:88mm; }
.wpe-q{ display:flex; align-items:flex-start; gap:2.5mm; font-size:13pt; font-weight:700; line-height:1.45;
  word-break:keep-all; }   /* 문장제: 어절 중간에서 줄이 끊기지 않게 */
/* 동그라미: 한 줄에 정확히 5개(p5) 또는 10개(p10). 지름(--d)·간격(--g)을 변수로 두고
   한 줄 폭(min-width)을 계산 → 개수가 적어도 상자 크기가 같아 "상자 크기=답" 단서가 생기지 않음 */
.wdots{ --d:7.4mm; --g:1.8mm; display:flex; flex-direction:column; gap:1.6mm; }
.wdrow{ display:flex; gap:var(--g); }
.wdot{ width:var(--d); height:var(--d); border-radius:50%; background:#E53935; border:0.3mm solid #B71C1C;
  display:inline-block; flex:0 0 auto; }
.wdots.p5{ min-width:calc(var(--d)*5 + var(--g)*4); }
.wdots.p10{ --d:5.6mm; --g:1.2mm; min-width:calc(var(--d)*10 + var(--g)*9); }
.wdot.hollow{ background:#fff; border:0.45mm solid #555; }   /* 색칠용 빈 동그라미 */
/* 동그라미를 담는 네모 상자 + 번호·상자·답칸 한 줄 배치 */
.wdbox{ border:0.5mm solid #444; border-radius:2mm; padding:2mm 2.5mm; display:inline-flex; }
.wdline{ display:flex; align-items:center; gap:3mm; }
/* 상자 + 그 아래 답칸: 열 폭이 상자 폭이라 답칸이 상자 오른쪽 끝에 맞고 밖으로 나가지 않음 */
.wcol{ display:flex; flex-direction:column; align-items:flex-end; gap:1.5mm; }
.ws-inst{ font-size:13.5pt; font-weight:800; padding:2mm 0 0; }
/* 크기 비교: 상자 2개가 한 칸에 들어가야 해 조금 작게(10문제는 더 작게) */
.cmpq .wdots{ --d:5.8mm; --g:1.3mm; min-height:calc(var(--d)*2 + 1.6mm); }   /* 두 줄 높이 고정 — 상자 크기가 완전히 같아야 세어서 비교 */
.ws-page.n10 .cmpq .wdots{ --d:5mm; --g:1.1mm; }
.weans{ font-size:16pt; font-weight:800; display:flex; align-items:center; gap:2.5mm; }
.weans .bl, .wjudge .bl{ display:inline-block; width:14mm; height:10mm; }
.weans .bl.w{ width:34mm; }
.weans .bl.ul{ border-bottom:0.4mm solid #666; }   /* 문장제 식·답: 쓸 자리를 밑줄로 표시 */
/* 모으기·가르기: 상자 2개+＋ 가 한 칸(88mm)에 들어가도록 동그라미를 작게 */
.wgs{ display:flex; flex-direction:column; align-items:center; gap:1.6mm; }
.wgs .wdots{ --d:5mm; --g:1.1mm; }
.wgrow{ display:flex; align-items:center; gap:3mm; }
.wgrow.wide{ gap:12mm; }
.wgplus{ font-size:15pt; font-weight:800; }
.wgarr{ font-size:13pt; color:#888; }
.wgbox{ min-width:16mm; min-height:11mm; border:0.45mm solid #444; border-radius:1.5mm; display:flex;
  align-items:center; justify-content:center; font-size:15pt; font-weight:800; padding:0 2mm; }
.wgbox.dash{ border-style:dashed; border-color:#999; }
.wseq{ display:flex; align-items:center; gap:2mm; }
.wsbox{ min-width:12mm; height:11mm; border:0.45mm solid #444; border-radius:1.5mm; display:inline-flex;
  align-items:center; justify-content:center; font-size:14pt; font-weight:800; padding:0 1.5mm; }
.wsbox.ans{ border-style:dashed; border-color:#999; }
.wsarr{ font-size:12pt; color:#888; }
.wjudge{ font-size:18pt; font-weight:800; }
/* 20문제 축소 */
.ws-page.n20 .wpe{ min-width:66mm; max-width:74mm; gap:1.5mm; }

/* ===== 모달 ===== */
.modal{ position:absolute; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:center; justify-content:center; }

.opt{ font-family:inherit; cursor:pointer; border:4px solid var(--choice-border); background:var(--choice-bg); color:var(--ink);

.opt.sel{ background:var(--accent); border-color:var(--accent-strong); color:#fff; }
/* 단계 선택 영역 탭 — 네비바 '단계' 버튼과 같은 초록(#00897B) 계열 */
.lvtabs{ display:flex; gap:.45rem; flex-wrap:wrap; justify-content:center; margin-bottom:.5rem; }
.lvtab{ font-family:inherit; cursor:pointer; border:3px solid #80CBC4; background:#E0F2F1;

.lvtab.sel{ background:#00897B; border-color:#00695C; color:#fff; }
/* 단계 선택 목록의 세부 단계: 테두리 없이 옅은 배경만 */
.lvlist .opt{ border:none; padding:.62rem 1.32rem; }
.lvlist .opt.sel{ background:var(--accent); color:#fff; }

/* ===== 기초 단계 36~46 (세기·담기·모으기가르기·비교·수열·문장제·채점) ===== */
.early{ display:flex; flex-direction:column; align-items:center; gap:.55rem; }
.early-q{ font-weight:800; color:var(--accent-strong); font-size:2.5rem; display:flex; align-items:center; gap:.5rem; }
.early-q .putn{ font-size:3.4rem; color:var(--no); }
.plate{ background:#fff; border:7px solid var(--accent); border-radius:50%; min-width:430px; min-height:250px;
  display:flex; align-items:center; justify-content:center; padding:1.1rem 1.6rem; box-shadow:0 8px 18px rgba(0,0,0,.08); }
.plate .cdot{ width:58px; height:58px; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; font-size:1.7rem; cursor:pointer; }
.plate.big{ min-width:560px; min-height:360px; }   /* 스물까지 세기: 4줄(5개씩)이 타원 안에 들어가는 크기 */
.grpring{ position:absolute; background:rgba(255,202,40,.42); border-radius:999px; pointer-events:none; z-index:3; }   /* 묶어 세기: 테두리 없이 노란 채움 */
/* 담기 */
.plate.put{ min-height:185px; width:410px; min-width:0; border-radius:2.4rem; gap:13px; flex-wrap:wrap; align-content:center; justify-content:flex-start; padding:1.1rem 1.4rem; }
.puttray{ display:flex; gap:15px; flex-wrap:wrap; justify-content:center; padding:.7rem 1.1rem; border-radius:1.2rem;
  background:var(--choice-bg); border:3px dashed var(--choice-border); width:412px; justify-content:flex-start; align-content:flex-start; }
.pdot{ width:58px; height:58px; touch-action:none; cursor:grab; user-select:none; transition:none; }   /* cdot의 transform 전환은 드래그를 방해 */
.pdot.lift{ position:relative; z-index:9; box-shadow:0 10px 18px rgba(0,0,0,.35); cursor:grabbing; }
.pslot{ width:58px; height:58px; border-radius:50%; border:4px dashed var(--accent); color:var(--accent);   /* .pdot과 같은 크기 → 한 줄 5개 줄바꿈 동일 */
  display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.6rem; opacity:.65; }
.pslot.on{ background:var(--choice-bg); opacity:1; border-color:var(--accent-strong); }
/* 모으기·가르기 */
.gsplit{ gap:.15rem; }
.grow1,.grow2{ display:flex; gap:2.6rem; justify-content:center; }
/* 상자 크기 고정(내용 수와 무관하게 세 상자 동일) + 동그라미 왼쪽부터 5개씩 — 담기와 같은 문법 */
.gcell{ width:228px; height:112px; border:4px solid var(--accent); border-radius:1.1rem;
  display:flex; align-items:flex-start; justify-content:flex-start; padding:.7rem .9rem; background:#fff; }
.gcell.gans{ align-items:center; justify-content:center; }   /* ? 상자만 중앙 */
.gcell .cdot{ width:34px; height:34px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:1.15rem; cursor:pointer; }
.gcell.gans .qblank{ font-size:2.2rem; }
.glink{ display:flex; gap:4rem; height:38px; align-items:stretch; }
.glink i{ width:5px; background:var(--accent); border-radius:3px; }
.glink.gv i:first-child,.glink.gs i:last-child{ transform:rotate(-27deg); }
.glink.gv i:last-child,.glink.gs i:first-child{ transform:rotate(27deg); }
/* 크기 비교 — 접시 자체가 선택지 */
.cmprow{ flex-direction:row; gap:3.2rem; }
/* 접시 크기 고정(개수와 무관하게 양쪽 동일) + 동그라미 왼쪽부터 5개씩 — 줄이 맞아 1:1 비교가 쉬움 */
.cmp{ font-family:inherit; background:#fff; border:6px solid var(--accent); border-radius:1.6rem; cursor:pointer;
  width:240px; height:172px; display:flex; align-items:flex-start; justify-content:flex-start; padding:1.1rem 1.4rem;
  box-shadow:0 8px 18px rgba(0,0,0,.08); transition:transform .15s; }
.cmp:hover{ transform:scale(1.03); }
.cmp .cdot{ width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:1.05rem; }
.cmp .cdot.extra{ box-shadow:0 0 0 4px var(--amber), 0 3px 4px rgba(0,0,0,.28); }   /* 짝 없이 남는 동그라미 */
.cmp.cur{ border-color:var(--ok); background:var(--ok-bg); }
.cmp.correct{ border-color:var(--ok); background:var(--ok-bg); }
.cmp.wrong{ border-color:var(--no); opacity:.5; }

.seqrow{ flex-direction:row; gap:.45rem; align-items:center; }
.seqbox{ min-width:92px; padding:.45rem .55rem; border:4px solid var(--accent); border-radius:.95rem; background:#fff;
  font-size:2.3rem; font-weight:800; text-align:center; color:var(--ink); transition:background .3s; }
.seqbox.on{ background:var(--choice-bg); border-color:var(--accent-strong); color:var(--accent-strong); }
.seqbox.qblank{ color:var(--accent-strong); }
.seqarrow{ color:var(--ink-soft); font-weight:800; font-size:1.5rem; }
/* 문장제 */
.wordq{ max-width:960px; gap:.55rem; }
.wtext{ font-size:1.5rem; font-weight:700; line-height:1.55; background:#fff; border:4px solid var(--accent);
  border-radius:1.1rem; padding:.7rem 1.2rem; }
.wpic{ display:flex; align-items:center; gap:1.1rem; justify-content:center; }
.wplus{ font-size:2rem; font-weight:800; color:var(--accent-strong); }
.estack{ display:flex; flex-direction:column; gap:.15rem; }
.erow{ display:flex; gap:.28rem; }
.wem{ font-size:2.1rem; line-height:1; transition:.2s; display:inline-block; }
.wem.on{ transform:scale(1.2); }
.wem.slash{ filter:grayscale(1); opacity:.35; }
/* 채점 놀이 */
.judge .faceh{ font-size:3rem; }
.jshown{ color:var(--accent-strong); }
.jshown.jfix s{ color:var(--no); margin-right:.4rem; }
.jbtn{ font-size:1.5rem; }

/* 담기 힌트 점선 자리 스냅 — 동그라미가 자리 "안"에 들어감 */
.pslot .pdot{ width:50px; height:50px; }
.pslot:has(.pdot){ font-size:0; border-style:solid; border-color:var(--accent-strong); opacity:1; background:#fff; }

/* ===== 버튼 폰트 통일(파일 끝 — 각 버튼 규칙의 font-family:inherit를 덮음) =====
   축소 이모지(BtnEmoji) 포함 스택: 이모지 유무와 무관하게 버튼 속 한글이 세로 가운데 정렬됨 */
button, .nav button, .btn, .btn-choice, .btn-name, .opt, .lvtab, .mbtn, .cmp{ font-family:var(--font-btn); }

/* 수 배열 1차 힌트: 상자 아래 매달린 수 모형(막대=10·동그라미=1) — 절대배치라 수열 배치 불변 */
.seqbox{ position:relative; }
.seqmodel{ position:absolute; top:calc(100% + 1.2rem); left:50%; transform:translateX(-50%);
  display:flex; align-items:flex-start; gap:.45rem; }
.seqmodel{ gap:.3rem; }
/* 공용 .rodwrap의 align-items:center를 덮어씀 — 5개 넘어 아랫줄로 내려오면 왼쪽부터 채우기(동그라미와 동일 규칙) */
.seqmodel .rodwrap{ display:flex; flex-direction:column; align-items:flex-start; gap:3.5px; }
.seqmodel .rodrow{ display:flex; justify-content:flex-start; gap:3.5px; min-height:0; }
.seqmodel .rod{ width:10px; height:44px; border-radius:2.5px; }
.seqmodel .cstack{ gap:3.5px; }
.seqmodel .crow5{ gap:3.5px; }
.seqmodel .cdot{ width:12px; height:12px; }
.seqrow.withmodel{ gap:.9rem; }   /* 모형 폭이 상자와 비슷해져 간격은 조금만 확대 */
.seqrow.withmodel.wide{ gap:2.2rem; }   /* 뛰어세기: 막대가 여러 개라 모형이 넓어 더 벌림 */

/* 🎈 손님 카드(학생 이름 선택 화면) — 학생 버튼과 구분되는 청록 점선 */
.btn-name.guest{ border-style:dashed; border-color:var(--teal); background:#E9F7F5; }
.btn-name.guest .nm{ color:#00695C; }

/* ===== 모으기·가르기 개선(v54) ===== */
.gcell.gans .qblank.plain{ border:0; padding:0; }              /* 점선 상자 없이 물음표만 */
.gsplit.ctr .gcell{ align-items:center; justify-content:center; }   /* 5까지는 상자 가운데 배치 */
.cdot.gv{ background-color:#7CB342; border-color:#33691E; }    /* 갈라 줄 만큼 표시하는 연두 동그라미 */
/* 자유 가르기 */
.gsplit.free .fdot{ cursor:grab; touch-action:none; user-select:none; transition:none; }
.gsplit.free .fdot.lift{ position:relative; z-index:9; box-shadow:0 10px 18px rgba(0,0,0,.35); cursor:grabbing; }
.gsplit.free .gcell{ gap:5px; flex-wrap:wrap; align-content:flex-start; }
.gsplit.free .gcell.drop{ border-style:dashed; }
.gsplit.ctr.free .gcell{ align-content:center; }        /* 5 이하 자유 가르기도 상자 가운데 */
.fwrap{ display:flex; flex-direction:column; align-items:center; gap:.35rem; }
.fnum{ font-size:1.9rem; font-weight:800; min-width:1.8rem; text-align:center; }
.fnum.ga, .fsent b.ga{ color:#33691E; }                 /* 왼쪽 = 초록(연두 동그라미와 짝) */
.fnum.gb, .fsent b.gb{ color:#C62828; }                 /* 오른쪽 = 빨강 */
.fsent{ margin-top:.6rem; font-size:1.45rem; font-weight:700; color:var(--ink); }

<script>
const WS_BG="";
/* =========================================================

   자세한 설정 방법: 설계.md 6장 참고
   ========================================================= */
const APP_VERSION = 'ver 56';
const REMOTE = {

const R = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
function bAdd(maxSum, minEach) { minEach = minEach || 1; let a, b; do { a = R(minEach, maxSum - minEach); b = R(minEach, maxSum - a); } while (a + b > maxSum); return { type: 'binary', a, b, op: '+', ans: a + b }; }
function bSub(maxA) { const a = R(2, maxA); const b = R(1, a); return { type: 'binary', a, b, op: '-', ans: a - b }; }

/* 세 자리 수 생성 헬퍼 (받아올림/내림 횟수 제어) */
function add3NoCarry() { const ha = R(1, 8), hb = R(1, 9 - ha), ta = R(0, 9), tb = R(0, 9 - ta), ua = R(0, 9), ub = R(0, 9 - ua); const a = ha * 100 + ta * 10 + ua, b = hb * 100 + tb * 10 + ub; return { type: 'binary', a, b, op: '+', ans: a + b }; }
function add3OneCarry() {
  const pos = R(0, 2); let ha, hb, ta, tb, ua, ub;
  if (pos === 0) { ua = R(1, 9); ub = R(10 - ua, 9); ta = R(0, 8); tb = R(0, 8 - ta); ha = R(1, 8); hb = R(1, 9 - ha); }        // 일의 자리만
  else if (pos === 1) { ua = R(0, 9); ub = R(0, 9 - ua); ta = R(1, 9); tb = R(10 - ta, 9); ha = R(1, 7); hb = R(1, 8 - ha); }  // 십의 자리만
  else { ua = R(0, 9); ub = R(0, 9 - ua); ta = R(0, 9); tb = R(0, 9 - ta); ha = R(1, 9); hb = R(10 - ha, 9); }                 // 백의 자리만
  const a = ha * 100 + ta * 10 + ua, b = hb * 100 + tb * 10 + ub; return { type: 'binary', a, b, op: '+', ans: a + b };
}
function sub3NoBorrow() { let a, b, ha, hb, ta, tb, ua, ub; do { ha = R(1, 9); hb = R(1, ha); ta = R(0, 9); tb = R(0, ta); ua = R(0, 9); ub = R(0, ua); a = ha * 100 + ta * 10 + ua; b = hb * 100 + tb * 10 + ub; } while (a <= b); return { type: 'binary', a, b, op: '-', ans: a - b }; }
function sub3OneBorrow() {
  const pos = R(0, 1); let ha, hb, ta, tb, ua, ub;
  if (pos === 0) { ua = R(0, 8); ub = R(ua + 1, 9); ta = R(1, 9); tb = R(0, ta - 1); ha = R(1, 9); hb = R(1, ha); }   // 일의 자리에서만
  else { ua = R(0, 9); ub = R(0, ua); ta = R(0, 8); tb = R(ta + 1, 9); ha = R(2, 9); hb = R(1, ha - 1); }             // 십의 자리에서만
  const a = ha * 100 + ta * 10 + ua, b = hb * 100 + tb * 10 + ub; return { type: 'binary', a, b, op: '-', ans: a - b };
}

function gatherSplit(max) {
  if (Math.random() < .5) { const a = R(1, max - 1), b = R(1, max - a); return { type: 'gather', a, b, ans: a + b }; }
  const n = R(3, max), k = R(1, n - 1); return { type: 'split', n, k, ans: n - k };
}
function seqGen(steps) {
  const step = steps[R(0, steps.length - 1)];
  const start = step === 1 ? R(1, 16) : step * R(1, 5);
  const arr = [0, 1, 2, 3].map(i => start + i * step);
  const blank = R(1, 3);                       // 첫 칸은 항상 보여줌
  return { type: 'seq', arr, blank, ans: arr[blank], step };
}

function wordGen() {

  const [item, emoji] = WORD_ITEMS[R(0, WORD_ITEMS.length - 1)];

  if (plus) {

      : `${item} ${a}개 중에서 ${b}개를 친구에게 주었어요. 몇 개가 남았을까요?`;
  }
  return { type: 'word', a, b, op: plus ? '+' : '-', ans: plus ? a + b : a - b, text, item, emoji };
}
function judgeGen() {
  const a = R(2, 9), b = R(2, 9), ok = Math.random() < .5;
  let shown = a * b;
  if (!ok) { const cand = [a, -a, b, -b, 1, -1].filter(d => shown + d > 0); shown += cand[R(0, cand.length - 1)]; }
  return { type: 'judge', a, b, shown, ans: ok ? 1 : 0 };
}

async function sha256(text) {
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  } catch (e) { /* 비보안 컨텍스트 폴백(간이 해시) */
    let h = 5381; for (const c of text) h = ((h << 5) + h + c.charCodeAt(0)) >>> 0;
    return 'x' + h.toString(16);
  }
}

/* =========================================================
   국어 조사 자동 선택 — 한자어 수 읽기의 받침 여부로 결정
   (TTS가 숫자를 일·이·삼…으로 읽으므로 그 읽기의 끝소리 기준)
   1일ㄹ 2이 3삼ㅁ 4사 5오 6육ㄱ 7칠ㄹ 8팔ㄹ 9구 · 0으로 끝나면 십/백/천(받침 있음)
   ========================================================= */
function numBatchim(n) {
  n = Math.abs(Math.floor(n));
  if (n === 0) return true;               // 영(ㅇ)
  const u = n % 10;
  if (u === 0) return true;               // 십·백·천·만 …
  return [false, true, false, true, false, false, true, true, true, false][u];
}
const josaEul = n => numBatchim(n) ? '을' : '를';   // 279를 / 4를 / 3을
const josaGwa = n => numBatchim(n) ? '과' : '와';   // 1과 / 4와
const josaEun = n => numBatchim(n) ? '은' : '는';   // 8은 / 2는
const josaIga = n => numBatchim(n) ? '이' : '가';   // 3이 / 4가
const josaYeyo = n => numBatchim(n) ? '이에요' : '예요'; // 3이에요 / 279예요
const josaRo = n => { const u = Math.abs(Math.floor(n)) % 10; return (!numBatchim(n) || u === 1 || u === 7 || u === 8) ? '로' : '으로'; }; // 2로 / 6으로
