/* ---- 지면 생성 ----
   항상 A4 한 장. 배열: 5문제=1×5 / 10문제=2×5 / 20문제=가로셈 2×10·세로셈 4×5(축소 크기).
   문제 영역(.ws-problems)이 남은 세로 공간을 균등 분배(space-around)해 지면 끝까지 채움.
   배경: src/print_bg.png|jpg|webp 를 두고 빌드하면 WS_BG로 내장되어 쪽 뒤에 깔림. */
const WS_NUM = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧', '⑨', '⑩', '⑪', '⑫', '⑬', '⑭', '⑮', '⑯', '⑰', '⑱', '⑲', '⑳'];
function buildPrintSheet(lvlId, cnt, mode) {
  const lvl = levelById(lvlId);
  const probs = Array.from({ length: cnt }, () => lvl.gen());
  let ps = $('printsheet');
  if (!ps) { ps = document.createElement('div'); ps.id = 'printsheet'; document.body.appendChild(ps); }
  const school = klass && klass.school ? esc(klass.school) : '';
  const schoolPart = school
    ? `${school}${/학교$/.test(school) ? '' : '학교'}`
    : `<span class="wl lg"></span>초등학교`;
  const early = EARLY_TYPES.has(probs[0].type);       // 기초 유형: 지필형 칸(가로/세로 선택 무관), 한 줄 2문제
  const per = cnt === 5 ? 1 : (!early && cnt === 20 && mode === 'v') ? 4 : 2;
  const eo = { per: (lvlId === 47 || lvlId === 48) ? 10 : 5 };   // 열·스물까지 세기는 동그라미 한 줄 10개
  const rows = [];
  for (let i = 0; i < probs.length; i += per) {
    rows.push(`<div class="ws-row ${mode === 'h' || early ? 'h' : ''} ${per === 1 ? 'single' : ''}">${probs.slice(i, i + per)
      .map((p, j) => early ? wsEarly(p, WS_NUM[i + j], eo) : mode === 'v' ? wsProblemV(p, WS_NUM[i + j]) : wsProblemH(p, WS_NUM[i + j])).join('')}</div>`);
  }
  const inst = early ? (WS_INST[probs[0].type] || '') : '';   // 문제가 같은 유형은 지시문 한 번만
  /* 일일수학풍 헤더: [네이비 로고 블록 | 왼쪽정렬 제목(그룹 小+단계명 大) | 학습일 기입란] */
  const header = `
    <div class="ws-head">
      <div class="ws-logo"><div class="t">매일매일<br>수학</div><div class="u">＋−×÷</div></div>
      <div class="ws-title"><div class="s">${esc(lvl.g)}</div><div class="b">${esc(lvl.name)}</div></div>
      <div class="ws-side"><div class="lbl">학습일</div><div class="dt"><span class="wl sm"></span> 월 <span class="wl sm"></span> 일</div></div>
    </div>
    <div class="ws-info">${schoolPart} &nbsp; (${'&nbsp;'.repeat(4)})학년 (${'&nbsp;'.repeat(4)})반 &nbsp; 이름: (${'&nbsp;'.repeat(24)})</div>`;
  const bg = (typeof WS_BG !== 'undefined' && WS_BG) ? `<img class="ws-bg" src="${WS_BG}" alt="">` : '';
  ps.innerHTML = `<div class="ws-page n${cnt} ${mode === 'v' ? 'v' : 'h'}">${bg}${header}${inst ? `<div class="ws-inst">${inst}</div>` : ''}<div class="ws-problems">${rows.join('')}</div></div>`;
}

/* ---- 세로셈 문제 한 칸 (자리 맞춤 점선 칸) ---- */
function wsProblemV(p, num) {
  if (p.op === '÷') return wsProblemH(p, num);   // 나눗셈은 가로셈으로만
  const m = faceModel(p);
  const ansLen = String(p.ans).length;
  const cell = (ch, cls) => `<td class="${cls || ''}">${ch}</td>`;
  const digitRow = (op, s, cols, cls) => {
    const pad = cols - s.length;
    let tds = cell(op, 'op' + (cls ? ' ' + cls : ''));
    for (let i = 0; i < cols; i++) tds += cell(i < pad ? '' : s[i - pad], cls);
    return `<tr>${tds}</tr>`;
  };
  const blankRow = (op, cols, cls) => {
    let tds = cell(op, 'op' + (cls ? ' ' + cls : ''));
    for (let i = 0; i < cols; i++) tds += cell('', cls);
    return `<tr>${tds}</tr>`;
  };
  let html = '';
  if (m.slot === 'end') {
    /* 일반형: 위 수들 → 가로줄 → 빈 답 칸 */
    const cols = Math.max(...m.nums.map(n => String(n).length), ansLen);
    m.nums.forEach((n, i) => {
      const last = i === m.nums.length - 1;
      html += digitRow(i === 0 ? '' : m.ops[i - 1], String(n), cols, last ? 'rule' : '');
    });
    html += blankRow('', cols, 'ans');
  } else {
    /* 빈칸형(10의 보수): 위 수 → 연산기호+빈 답 칸 → 가로줄 → 결과 */
    const cols = Math.max(String(m.nums[0]).length, String(m.result).length, ansLen);
    html += digitRow('', String(m.nums[0]), cols, '');
    html += blankRow(m.ops[0], cols, 'ans rule');
    html += digitRow('', String(m.result), cols, '');
  }
  return `<div class="wp"><span class="wnum">${num || ''}</span><table class="wpv">${html}</table></div>`;
}

/* ---- 기초 유형 지필형 한 칸 (세기·담기·모으기·가르기·비교·수열·문장제·채점) ----
   문제 문장이 모든 문항에서 같은 유형은 지면 상단에 지시문 한 번만(WS_INST), 문항엔 그림·답칸만. */
const WS_INST = {
  count: '※ 모두 몇 개인지 세어 보세요.',
  seq: '※ 빈칸에 알맞은 수를 쓰세요.',
  compare: '※ 더 많은 쪽에 ○ 하세요.',
  judge: '※ 계산이 맞으면 ○, 틀리면 ×를 하세요.',
};
/* 동그라미: 한 줄에 정확히 per개(5 또는 10) — 겹치지 않도록 크기는 .wdots.pN 에서 지정 */
const wsDots = (n, hollow, per) => {
  per = per || 5;
  const dot = `<span class="wdot${hollow ? ' hollow' : ''}"></span>`;
  let s = '';
  for (let i = 0; i < n; i += per) s += `<div class="wdrow">${dot.repeat(Math.min(per, n - i))}</div>`;
  return `<div class="wdots p${per}">${s}</div>`;
};
const wsBox = inner => `<div class="wdbox">${inner}</div>`;   // 동그라미를 담는 네모 상자
function wsEarly(p, num, o) {
  o = o || {};
  const B = '<span class="bl"></span>', N = `<span class="wnum">${num || ''}</span>`;
  let body = '', q = '';
  /* 지시문을 위로 뺀 유형: 번호 + 네모 상자(+답칸)만 */
  if (p.type === 'count')   /* 답칸은 상자 아래 오른쪽 끝에 맞춤(.wcol이 상자 폭이라 밖으로 안 나감) */
    return `<div class="wpe"><div class="wdline">${N}<div class="wcol">${wsBox(wsDots(p.n, false, o.per))}
      <div class="weans">( ${B} )개</div></div></div></div>`;
  if (p.type === 'compare')
    return `<div class="wpe cmpq"><div class="wdline">${N}${wsBox(wsDots(p.a))}${wsBox(wsDots(p.b))}</div></div>`;
  if (p.type === 'seq')
    return `<div class="wpe"><div class="wdline">${N}<div class="wseq">${p.arr.map((v, i) => i === p.blank
      ? `<span class="wsbox ans">&nbsp;</span>` : `<span class="wsbox">${v}</span>`).join('<span class="wsarr">→</span>')}</div></div></div>`;
  if (p.type === 'judge')   /* 지시문은 위에 한 번 — 문항은 식과 ( )만 */
    return `<div class="wpe"><div class="wdline">${N}<div class="wjudge">${p.a} × ${p.b} = ${p.shown} &nbsp; ( &nbsp;&nbsp;&nbsp; )</div></div></div>`;
  if (p.type === 'put')   /* 색칠할 수가 문항마다 달라 문제는 그대로 두고, 그림만 상자 안에 */
    return `<div class="wpe"><div class="wpe-q">${N}${p.n}개만큼 색칠하세요.</div>
      <div class="wdline">${wsBox(wsDots(p.max, true))}</div></div>`;
  if (p.type === 'gather') {
    q = '모으면 몇 개일까요?';   /* 한 줄에 들어가게 짧게(줄바꿈 방지) */
    body = `<div class="wgs"><div class="wgrow">${wsBox(wsDots(p.a))}<span class="wgplus">＋</span>${wsBox(wsDots(p.b))}</div><div class="wgarr">↓</div><div class="wgbox dash">&nbsp;</div></div>`;
  } else if (p.type === 'freesplit') {
    q = `${p.n}을 둘로 자유롭게 가르세요.`;
    body = `<div class="wgs"><div class="wgbox">${p.n}</div><div class="wgarr">↙ ↘</div><div class="wgrow"><div class="wgbox dash">&nbsp;</div><div class="wgbox dash">&nbsp;</div></div></div>`;
  } else if (p.type === 'split') {
    q = `${p.n}을 둘로 가르세요.`;
    body = `<div class="wgs"><div class="wgbox">${p.n}</div><div class="wgarr">↙ ↘</div><div class="wgrow"><div class="wgbox">${p.k}</div><div class="wgbox dash">&nbsp;</div></div></div>`;
  } else {   /* word: 식·답은 쓸 자리가 보이게 밑줄(네모 상자는 쓰지 않음) */
    q = p.text;
    body = `<div class="weans">식: <span class="bl w ul"></span> &nbsp; 답: <span class="bl ul"></span> 개</div>`;
  }
  return `<div class="wpe"><div class="wpe-q"><span class="wnum">${num || ''}</span>${q}</div>${body}</div>`;
}

/* ---- 가로셈 문제 한 줄 ---- */
function wsProblemH(p, num) {
  const B = '<span class="bl"></span>';
  let t;
  if (p.type === 'binary') t = `${p.a} ${sgn(p.op)} ${p.b} = ${B}`;
  else if (p.type === 'triple') t = `${p.a} ${sgn(p.op)} ${p.b} ${sgn(p.op2)} ${p.c} = ${B}`;
  else if (p.form === 'subFromTen') t = `10 − ${B} = ${p.result}`;
  else t = `${p.k} + ${B} = 10`;
  return `<div class="wph"><span class="wnum">${num || ''}</span>${t}</div>`;
}

/* =========================================================
   11 기초·확장 단계 (36~46) — 세기·담기·모으기·가르기·비교·수 배열·문장제·채점
   토도수학 워크시트 패턴(2026-07-16 검토) 기반. ver23 힌트 공통 문법 준수:
   1차=단서만 / 2차=세어 읽기(음성 동기)로 정답까지 유도, 타깃 사전 확정, KO_NUM 수사.
   ========================================================= */
const EARLY_TYPES = new Set(['count', 'put', 'gather', 'split', 'compare', 'seq', 'word', 'judge', 'freesplit']);

/* 이모지 묶음(문장제) — 5개씩 줄바꿈, 낱개는 .wem으로 감싸 힌트에서 하나씩 짚음 */
function emojiRows(e, n) {
  let s = '';
  for (let i = 0; i < n; i += 5) {
    let r = ''; for (let j = i; j < Math.min(i + 5, n); j++) r += `<span class="wem">${e}</span>`;
    s += `<div class="erow">${r}</div>`;
  }
  return `<div class="estack">${s}</div>`;
}

function earlyFace(p) {
  if (p.type === 'count')
    return `<div class="early"><div class="plate${p.n > 10 ? ' big' : ''}" id="cplate">${circleStack(p.n, 'red')}</div>
      <div class="early-q">모두 <span class="qblank" id="qslot">?</span> 개</div></div>`;
  if (p.type === 'put') {
    const rows = Math.ceil(p.max / 5);                    // 트레이 높이 고정(동그라미가 줄어도 안 변함)
    return `<div class="early putwrap">
      <div class="early-q"><b class="putn">${p.n}</b>개를 접시에 담아요</div>
      <div class="plate put" id="putplate"></div>
      <div class="puttray" id="puttray" style="min-height:${rows * 58 + (rows - 1) * 15 + 28}px">${'<div class="pdot cdot red"></div>'.repeat(p.max)}</div></div>`;
  }
  if (p.type === 'gather')   /* 5까지는 상자 가운데 정렬(.ctr) — 수가 적어 왼쪽 정렬이 허전함 */
    return `<div class="early gsplit ${p.ans <= 5 ? 'ctr' : ''}">
      <div class="grow2"><div class="gcell" id="gA">${circleStack(p.a, 'red')}</div><div class="gcell" id="gB">${circleStack(p.b, 'red')}</div></div>
      <div class="glink gv"><i></i><i></i></div>
      <div class="grow1"><div class="gcell gans" id="gC"><span class="qblank plain" id="qslot">?</span></div></div></div>`;
  if (p.type === 'split')
    return `<div class="early gsplit ${p.n <= 5 ? 'ctr' : ''}">
      <div class="grow1"><div class="gcell" id="gC">${circleStack(p.n, 'red')}</div></div>
      <div class="glink gs"><i></i><i></i></div>
      <div class="grow2"><div class="gcell" id="gA">${circleStack(p.k, 'red')}</div><div class="gcell gans" id="gB"><span class="qblank plain" id="qslot">?</span></div></div></div>`;
  if (p.type === 'freesplit')   /* 자유 가르기: 위 상자의 동그라미를 아래 두 상자로 스스로 나눔 */
    return `<div class="early gsplit ${p.n <= 5 ? 'ctr' : ''} free">
      <div class="grow1"><div class="gcell" id="gC">${'<div class="cdot red fdot"></div>'.repeat(p.n)}</div></div>
      <div class="glink gs"><i></i><i></i></div>
      <div class="grow2">
        <div class="fwrap"><div class="gcell drop" id="gA"></div><div class="fnum ga" id="fa">0</div></div>
        <div class="fwrap"><div class="gcell drop" id="gB"></div><div class="fnum gb" id="fb">0</div></div></div>
      <div class="fsent" id="fsent"></div></div>`;
  if (p.type === 'compare')
    return `<div class="early cmprow">
      <button class="cmp" data-v="0" onclick="answer(this,${p.ans})">${circleStack(p.a, 'red')}</button>
      <button class="cmp" data-v="1" onclick="answer(this,${p.ans})">${circleStack(p.b, 'red')}</button></div>`;
  if (p.type === 'seq')
    return `<div class="early seqrow">${p.arr.map((v, i) => i === p.blank
      ? `<span class="seqbox qblank" id="qslot">?</span>` : `<span class="seqbox">${v}</span>`).join('<span class="seqarrow">→</span>')}</div>`;
  if (p.type === 'word') {
    const pic = p.op === '+'
      ? `<div class="wpic">${emojiRows(p.emoji, p.a)}<span class="wplus">＋</span>${emojiRows(p.emoji, p.b)}</div>`
      : `<div class="wpic">${emojiRows(p.emoji, p.a)}</div>`;
    return `<div class="early wordq"><div class="wtext">${p.text}</div>${pic}
      <div class="early-q">답: <span class="qblank" id="qslot">?</span> 개</div></div>`;
  }
  /* judge: 채점 놀이 — 적힌 답이 맞는지 판단 */
  return `<div class="early judge"><div class="faceh"><span class="fnum">${p.a}</span><span class="fsign">×</span><span class="fnum">${p.b}</span><span class="fsign">=</span><span class="fnum jshown" id="jshown">${p.shown}</span></div></div>`;
}

/* ---- 탭 카운팅(공용): 동그라미를 누르면 순서대로 "하나, 둘…" 즉시 소리(speakFast) + 번호 표시.
   세기(cplate)·모으기·가르기(gcell) 공용 — 문제당 카운터 하나(상자를 건너 이어 셈) ---- */
function initTapCount(sel) {
  const dots = [...document.querySelectorAll(sel)];
  /* 카운터는 DOM(tapped 수)에서 유도 — 힌트가 미리 번호를 매겨도 이어서 셀 수 있음.
     다시 누르면 번호 취소 + 뒤 번호들 자동 당김(항상 1..k 연속 유지) */
  dots.forEach(d => d.onpointerdown = () => {
    if (locked) return;
    if (d.classList.contains('tapped')) {           // 토글 해제
      const k = +d.textContent;
      d.classList.remove('tapped'); d.textContent = '';
      dots.forEach(x => { if (x.classList.contains('tapped') && +x.textContent > k) x.textContent = +x.textContent - 1; });
      tick();
      return;
    }
    const cnt = dots.filter(x => x.classList.contains('tapped')).length + 1;
    d.classList.add('tapped'); d.textContent = cnt;
    d.animate([{ transform: 'scale(1.35)' }, { transform: 'scale(1)' }], { duration: 200 });
    speakFast(KO_NUM[cnt] || String(cnt));
  });
}
function initCount() { initTapCount('#cplate .cdot'); }

/* ---- 담기: 드래그(Pointer Events, _sc 보정) + 탭 토글 대체 ---- */
function initPut() {
  const tray = $('puttray'), plate = $('putplate'); if (!tray || !plate) return;
  [...tray.querySelectorAll('.pdot')].forEach(d => {
    let drag = null;
    d.onpointerdown = e => {
      if (locked) return;
      try { d.setPointerCapture(e.pointerId); } catch (err) { }   // 캡처 실패해도 탭 토글은 동작해야 함
      drag = { sx: e.clientX, sy: e.clientY, moved: false };
      d.classList.add('lift');
    };
    d.onpointermove = e => {
      if (!drag) return;
      const sc = window._sc || 1, dx = (e.clientX - drag.sx) / sc, dy = (e.clientY - drag.sy) / sc;
      if (Math.abs(dx) + Math.abs(dy) > 6) drag.moved = true;
      d.style.transform = `translate(${dx}px,${dy}px)`;
    };
    d.onpointerup = e => {
      if (!drag) return;
      const moved = drag.moved; drag = null;
      d.classList.remove('lift'); d.style.transform = '';
      const r = plate.getBoundingClientRect();
      const over = e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom;
      const inPlate = plate.contains(d);                // 점선 자리(.pslot) 안에 있어도 접시 소속
      const toPlate = moved ? over : !inPlate;          // 탭(제자리 클릭)은 반대편으로 토글
      if (toPlate && !inPlate) {
        /* 힌트 점선 자리가 있으면 빈 자리 안으로 스냅 — 자리가 다 차면 그 이상 못 담음 */
        const slots = [...plate.querySelectorAll('.pslot')];
        const slot = slots.find(s => !s.querySelector('.pdot'));
        if (slots.length && !slot) { wiggle(d); return; }
        (slot || plate).appendChild(d);
        d.animate([{ transform: 'scale(1.35)' }, { transform: 'scale(1)' }], { duration: 220 });
        const c = plate.querySelectorAll('.pdot').length;
        speakFast(koCnt(c) + ' 개');                    // 담을 때마다 즉시 개수 세어 줌(한 개, 두 개…)
      } else if (!toPlate && inPlate) tray.appendChild(d);
    };
    d.onpointercancel = () => { drag = null; d.classList.remove('lift'); d.style.transform = ''; };
  });
}
function putSubmit() {
  if (locked) return;
  const p = session.items[session.idx];
  const c = $('putplate').querySelectorAll('.pdot').length;
  if (c === p.n) {
    locked = true; chime(true); celebrate($('putplate')); speak(praise());
    afterCorrect(foreignPraise() ? 2800 : undefined);
  } else {
    chime(false); wrongCount++; wiggle($('putplate'));
    const msg = c < p.n ? `아직 모자라요. ${p.n}개를 담아요.` : `너무 많아요. ${p.n}개만 담아요.`;
    const lv = (current && current.hintLv) || 'normal';
    if (lv === 'off') { speak(msg); return; }
    const stage = wrongCount + (lv === 'strong' ? 1 : 0);
    let started = false;
    const go = () => { if (started) return; started = true; routeHint(stage); };
    speak(msg, go);                                   // 안내가 끝난 뒤 힌트(잘림 방지)
    setTimeout(go, foreignPraise() ? 5200 : 3200);
  }
}

/* ---- 힌트 ---- */
function routeEarlyHint(p, h, stage) {
  if (p.type === 'count') return hintCount(p, h, stage);
  if (p.type === 'put') return hintPut(p, h, stage);
  if (p.type === 'gather' || p.type === 'split') return hintGS(p, h, stage);
  if (p.type === 'freesplit') return hintFree(p, h, stage);
  if (p.type === 'compare') return hintCompare(p, h, stage);
  if (p.type === 'seq') return hintSeq(p, h, stage);
  if (p.type === 'word') return hintWord(p, h, stage);
  hintMul(p, h, stage);                                 // judge: 뛰어세기로 바른 값을 확인하고 스스로 판단
}
/* 묶음 테두리(빨간 동그라미) — 대상 동그라미들의 합집합 영역에 사전 생성(_sc 보정), 발화 시점에 표시 */
function grpRing(ds) {
  const stg = $('stage'), sc = window._sc || 1, sr = stg.getBoundingClientRect();
  let l = 1e9, t = 1e9, r = -1e9, b = -1e9;
  ds.forEach(d => { const q = d.getBoundingClientRect(); l = Math.min(l, q.left); t = Math.min(t, q.top); r = Math.max(r, q.right); b = Math.max(b, q.bottom); });
  const e = document.createElement('div'); e.className = 'grpring';
  /* 세로 여백은 줄 간격(5px)보다 작게 — 다음 줄 동그라미를 침범하지 않음 */
  e.style.left = ((l - sr.left) / sc - 12) + 'px'; e.style.top = ((t - sr.top) / sc - 2) + 'px';
  e.style.width = ((r - l) / sc + 24) + 'px'; e.style.height = ((b - t) / sc + 4) + 'px';
  e.style.visibility = 'hidden'; stg.appendChild(e); return e;
}
function hintCount(p, h, stage) {
  /* 다섯 미만=하나씩 / 5 이상=다섯 묶음 / 10 초과=열 묶음.
     1차=묶음만(노란 채움 + 묶인 동그라미에 번호 1~5) → 학생이 이어 세도록 / 2차=남은 것까지 번호 이어 붙이며 정답. */
  const grp = p.n > 10 ? 10 : p.n >= 5 ? 5 : 0;
  const dots = [...document.querySelectorAll('#cplate .cdot')];
  dots.forEach(d => { d.classList.remove('tapped'); d.textContent = ''; });    // 학생이 매긴 번호와 섞이지 않게 전부 초기화
  const mark = (d, no) => { d.textContent = no; d.classList.add('tapped'); };   // 탭 세기와 같은 번호 표시(이어 세기 연동)
  if (!grp) {
    h.innerHTML = `<div class="tip">손으로 하나씩 짚으며 세어 봐요</div>`;
    if (stage === 1) { speak('손으로 하나씩 짚으며 세어 봐요.'); return; }
    const items = dots.map((d, i) => ({ text: KO_NUM[i + 1] || String(i + 1), action: () => mark(d, i + 1) }));
    items.push({ text: `모두 ${koCnt(p.n)} 개. 정답은 ${p.n}${josaYeyo(p.n)}.` });
    speakSequence(items); return;
  }
  h.innerHTML = `<div class="tip"><b>${koCnt(grp)} 개</b>를 한 번에 묶고, 이어서 세어 봐요</div>`;
  const items = [];
  if (!document.querySelector('#stage .grpring')) {          // 1차: 묶음 생성(2차 재진입 시엔 유지)
    const ring = grpRing(dots.slice(0, grp));
    items.push({
      text: `${koCnt(grp)} 개를 한 번에 묶어요. ${KO_NUM[grp]}.`, action: () => {
        ring.style.visibility = '';
        ring.animate([{ transform: 'scale(.6)', opacity: 0 }, { transform: 'scale(1)', opacity: 1 }], { duration: 320, easing: 'cubic-bezier(.2,1.4,.4,1)' });
        dots.slice(0, grp).forEach((d, i) => mark(d, i + 1));
      }
    });
  } else dots.slice(0, grp).forEach((d, i) => mark(d, i + 1));
  if (stage >= 2) {                                          // 2차: 남은 동그라미 이어 번호(여섯, 일곱…) + 정답
    for (let i = grp; i < p.n; i++) { const d = dots[i]; items.push({ text: KO_NUM[i + 1] || String(i + 1), action: () => mark(d, i + 1) }); }
    items.push({ text: `모두 ${koCnt(p.n)} 개. 정답은 ${p.n}${josaYeyo(p.n)}.` });
  }
  if (items.length) speakSequence(items);
}
function hintPut(p, h, stage) {
  const plate = $('putplate'), tray = $('puttray');
  /* 1차: 담았던 동그라미를 모두 원위치로 되돌리고, 숫자 쓰인 점선 자리 n개를 제시(다시 자리에 맞춰 담기) */
  if (plate && tray) [...plate.querySelectorAll('.pdot')].forEach(d => tray.appendChild(d));
  if (plate && !plate.querySelector('.pslot'))
    for (let i = 0; i < p.n; i++) { const g = document.createElement('div'); g.className = 'pslot'; g.textContent = i + 1; plate.appendChild(g); }
  h.innerHTML = `<div class="tip">접시의 옅은 자리에 하나씩 담아 봐요</div>`;
  if (stage === 1) { speak(`접시에 자리가 ${koCnt(p.n)} 개 생겼어요. 자리에 맞춰 담아 봐요.`); return; }
  const slots = plate ? [...plate.querySelectorAll('.pslot')] : [];
  const items = slots.map((g, i) => ({ text: KO_NUM[i + 1] || String(i + 1), action: () => g.classList.add('on') }));
  items.push({ text: `${koCnt(p.n)} 개를 담으면 돼요.` });
  speakSequence(items);
}
/* 모으기·가르기 — 착지 슬롯 사전 생성, 동그라미가 상자 사이를 날아 이동 */
function gsSlots(cell, n, cls) {
  cell.innerHTML = '';
  const stack = document.createElement('div'); stack.className = 'cstack'; cell.appendChild(stack);
  const slots = [];
  for (let i = 0; i < n; i++) {
    let row = [...stack.querySelectorAll('.crow5')].find(r => r.children.length < 5);
    if (!row) { row = document.createElement('div'); row.className = 'crow5'; stack.appendChild(row); }
    const s = document.createElement('div'); s.className = 'cdot red' + (cls ? ' ' + cls : ''); s.style.visibility = 'hidden'; row.appendChild(s); slots.push(s);
  }
  return slots;
}
function hintGS(p, h, stage) {
  const gather = p.type === 'gather';
  if (gather) return hintGather(p, h, stage);
  return hintSplit(p, h, stage);
}
/* 모으기 — 1차: 동그라미가 아래 상자로 모이는 애니메이션 / 2차: 모인 것에 번호를 매기며 세기 */
function hintGather(p, h, stage) {
  h.innerHTML = `<div class="tip">동그라미를 아래 상자에 모아요</div>`;
  const gC = $('gC');
  const landed = [...gC.querySelectorAll('.cdot')].filter(d => d.style.visibility !== 'hidden');
  if (!landed.length) {                                  // 아직 안 모았으면 먼저 모으기(1·2차 공통)
    const slots = gsSlots(gC, p.ans);
    const src = [...document.querySelectorAll('#gA .cdot'), ...document.querySelectorAll('#gB .cdot')];
    speak('동그라미를 아래 상자에 모아요.');
    src.forEach((d, i) => setTimeout(() => flyMove(d, slots[i], () => {
      d.style.visibility = 'hidden'; slots[i].style.visibility = ''; slots[i].classList.add('born');
    }), 350 + i * 300));
    if (stage < 2) return;
    setTimeout(() => countGathered(p), 350 + src.length * 300 + 500);   // 2차: 모으기 끝나고 세기
    return;
  }
  if (stage >= 2) countGathered(p);
}
/* 모인 동그라미에 번호를 매기며 "하나, 둘…" → "모으면 네 개가 돼요" */
function countGathered(p) {
  const ds = [...$('gC').querySelectorAll('.cdot')];   // 이동이 아직 끝나지 않았어도 슬롯 전체를 셈
  const items = ds.map((d, i) => ({
    text: KO_NUM[i + 1] || String(i + 1),
    action: () => { d.style.visibility = ''; d.textContent = i + 1; d.classList.add('tapped'); d.animate([{ transform: 'scale(1.3)' }, { transform: 'scale(1)' }], { duration: 200 }); },
  }));
  items.push({ text: `모으면 ${koCnt(p.ans)} 개가 돼요.` });
  speakSequence(items);
}
/* 가르기 — 1차: 갈라 줄 만큼(k개) 색을 바꿔 표시(위·아래 같은 색) / 2차: 그 색 동그라미를 아래로 옮겨 남는 수 세기 */
function hintSplit(p, h, stage) {
  const top = [...$('gC').querySelectorAll('.cdot')];
  if (stage === 1) {
    h.innerHTML = `<div class="tip"><b>연두색 ${koCnt(p.k)} 개</b>를 갈라 주면, <b>빨간 동그라미</b>가 몇 개 남을까요?</div>`;
    top.slice(0, p.k).forEach(d => d.classList.add('gv'));              // 위 상자: 갈라 줄 만큼 연두
    [...$('gA').querySelectorAll('.cdot')].forEach(d => d.classList.add('gv'));   // 아래 왼쪽도 같은 색
    speak(`연두색 ${koCnt(p.k)} 개를 갈라 주면, 빨간 동그라미가 몇 개 남을까요?`);
    return;
  }
  /* 2차: 연두 k개는 왼쪽, 빨강 나머지는 오른쪽 상자로 갈라지고 각각 번호를 붙임 */
  h.innerHTML = `<div class="tip">가르고 남은 동그라미가 몇 개인지 세어 봐요</div>`;
  const gv = top.filter(d => d.classList.contains('gv'));
  const movers = gv.length ? gv : top.slice(0, p.k);
  movers.forEach(d => d.classList.add('gv'));
  const rest = top.filter(d => !movers.includes(d));
  const slotsA = gsSlots($('gA'), p.k, 'gv');           // 왼쪽=갈라 준 만큼(연두)
  const slotsB = gsSlots($('gB'), p.ans);              // 오른쪽=남은 만큼(빨강) — 물음표 자리를 대체
  const fly = (d, slot, i) => setTimeout(() => flyMove(d, slot, () => {
    d.style.visibility = 'hidden'; slot.style.visibility = ''; slot.classList.add('born');
  }), i * 240);
  const items = [{
    text: '연두색은 왼쪽 상자에, 빨간색은 오른쪽 상자에 갈라요.',
    action: () => { movers.forEach((d, i) => fly(d, slotsA[i], i)); rest.forEach((d, i) => fly(d, slotsB[i], movers.length + i)); },
  }, {
    text: `${p.n}${josaEun(p.n)} ${p.k}${josaGwa(p.k)} ${p.ans}${josaRo(p.ans)} 가를 수 있어요.`,
    action: () => [slotsA, slotsB].forEach(ss => ss.forEach((d, i) => {   // 상자마다 1부터 번호
      d.style.visibility = ''; d.textContent = i + 1; d.classList.add('tapped');
      d.animate([{ transform: 'scale(1.3)' }, { transform: 'scale(1)' }], { duration: 200 });
    })),
  }];
  speakSequence(items);
}
function hintCompare(p, h, stage) {
  const L = [...document.querySelectorAll('.cmp[data-v="0"] .cdot')];
  const R = [...document.querySelectorAll('.cmp[data-v="1"] .cdot')];
  const pair = Math.min(p.a, p.b), n = Math.max(p.a, p.b);
  h.innerHTML = `<div class="tip">양쪽을 <b>하나씩 짝지어</b> 세어 봐요.<br><b>짝 없이 남는 쪽</b>이 더 많아요.</div>`;
  const items = [];
  for (let i = 0; i < n; i++) {
    const num = i + 1, extra = i >= pair, ds = [L[i], R[i]].filter(Boolean);
    items.push({
      text: KO_NUM[num] || String(num),
      action: () => ds.forEach(d => {
        d.textContent = num; d.classList.add('tapped');
        if (extra) d.classList.add('extra');             // 짝이 없는 = 남는 동그라미
        d.animate([{ transform: 'scale(1.3)' }, { transform: 'scale(1)' }], { duration: 200 });
      }),
    });
  }
  if (stage >= 2) {
    const moreLeft = p.a > p.b, d = Math.abs(p.a - p.b);
    items.push({
      text: `${moreLeft ? '왼쪽' : '오른쪽'}이 ${koCnt(d)} 개 더 많아요. 많은 쪽을 눌러요.`,
      action: () => { const w = document.querySelector(`.cmp[data-v="${p.ans}"]`); if (w) w.classList.add('cur'); },
    });
  }
  speakSequence(items);
}
/* 수 배열 1차 힌트용 수 모형 — 십 막대(파랑)+낱개 동그라미(빨강), 둘 다 5개씩 줄바꿈.
   상자 아래 절대배치라 수열 배치가 흔들리지 않음(힌트 공통 문법: 모형은 매달림) */
function seqModel(n, dotsOnly) {
  /* dotsOnly: 9→10→11처럼 10을 건너는 구간 — 막대로 바꾸면 모양이 끊겨 "하나씩 늘어남"이 안 보이므로 동그라미로만 */
  const T = dotsOnly ? 0 : Math.floor(n / 10), U = dotsOnly ? n : n % 10;
  const rows = (cnt, cls, row) => { let s = ''; for (let i = 0; i < cnt; i += 5) s += `<div class="${row}">${`<div class="${cls}"></div>`.repeat(Math.min(5, cnt - i))}</div>`; return s; };
  return `<div class="seqmodel"><div class="rodwrap">${rows(T, 'rod', 'rodrow')}</div><div class="cstack">${rows(U, 'cdot red', 'crow5')}</div></div>`;
}
function hintSeq(p, h, stage) {
  const rule = p.step === 1 ? '수가 1씩 커져요. 순서대로 세어 봐요.' : `수가 ${p.step}씩 커져요. 뛰어 세어 봐요.`;
  /* 1차: 채워진 수 아래에 수 모형 — 빈칸은 비워 두어 "얼마씩 늘어나는지" 규칙을 스스로 찾게.
     뛰어세기(최대 80)도 포함: 10씩=막대만 하나씩 / 5씩=막대+동그라미 5개가 번갈아 — 규칙이 눈에 보임 */
  const useModel = Math.max(...p.arr) <= 80;
  /* 10을 건너는 구간(예: 8·9·10·11)은 막대로 바뀌면 연속성이 끊겨 보임 → 전부 동그라미로.
     단 뛰어세기(step≠1)는 제외 — 5씩인데 20을 동그라미 20개로 그리면 "5씩"이 오히려 안 보임 */
  const dotsOnly = p.step === 1 && Math.min(...p.arr) < 10 && Math.max(...p.arr) >= 10;
  if (useModel) {
    const row = document.querySelector('#qface .seqrow');
    /* 뛰어세기는 막대가 여러 개라 모형이 넓어짐 → 상자 간격을 더 벌림 */
    if (row) row.classList.add('withmodel', ...(p.step === 1 ? [] : ['wide']));
    [...document.querySelectorAll('#qface .seqbox')].forEach((b, i) => {
      if (i !== p.blank && !b.querySelector('.seqmodel')) b.insertAdjacentHTML('beforeend', seqModel(p.arr[i], dotsOnly));
    });
  }
  /* 막대가 실제로 보일 때만 막대 설명 — 한 자리·10 건너기 구간은 동그라미만 나오므로 */
  const hasRod = !dotsOnly && Math.max(...p.arr) >= 10;
  const mTip = hasRod ? '<b>파란 막대는 10</b>, <b>빨간 동그라미는 1</b>이에요. 얼마씩 늘어나는지 보세요.'
    : '<b>동그라미가 몇 개씩</b> 늘어나는지 세어 보세요.';
  h.innerHTML = `<div class="tip">${p.step === 1 ? '수가 1씩 커져요. 순서대로 세어 봐요.' : `수가 <b>${p.step}씩</b> 커져요. 뛰어 세어 봐요.`}
    ${useModel ? '<br>' + mTip : ''}</div>`;
  if (stage === 1) {
    speak(rule + (useModel ? (hasRod ? ' 파란 막대는 십, 빨간 동그라미는 일이에요.' : ' 동그라미가 몇 개씩 늘어나는지 세어 보세요.') : ''));
    return;
  }
  const boxes = [...document.querySelectorAll('#qface .seqbox')];
  const items = p.arr.map((v, i) => ({ text: String(v), action: () => boxes[i] && boxes[i].classList.add('on') }));
  items.push({ text: `빈칸은 ${p.ans}${josaYeyo(p.ans)}.` });
  speakSequence(items);
}
function hintWord(p, h, stage) {
  const plus = p.op === '+';
  h.innerHTML = `<div class="tip">식으로 나타내면 <b>${p.a} ${plus ? '＋' : '−'} ${p.b}</b>${josaYeyo(p.b)}</div>`;
  if (stage === 1) { speak(`식으로 나타내면, ${p.a} ${plus ? '더하기' : '빼기'} ${p.b}${josaYeyo(p.b)}.`); return; }
  const ems = [...document.querySelectorAll('#qface .wem')];
  const items = [];
  if (plus) ems.forEach((d, i) => items.push({ text: String(i + 1), action: () => d.classList.add('on') }));
  else for (let k = 0; k < p.b; k++) { const idx = p.a - 1 - k; items.push({ text: String(p.a - 1 - k), action: () => ems[idx] && ems[idx].classList.add('slash') }); }
  items.push({ text: `정답은 ${p.ans}${josaYeyo(p.ans)}.` });
  speakSequence(items);
}

/* ---- 자유 가르기: 위 상자의 동그라미를 아래 두 상자로 스스로 나눠 담기 ----
   담기(initPut)와 같은 드래그 문법 + 탭 대체. 위가 비면 완료 → "4는 1과 3으로 가를 수 있어요" */
function initFreeSplit() {
  const src = $('gC'), A = $('gA'), B = $('gB'); if (!src || !A || !B) return;
  const hit = (e, el) => { const r = el.getBoundingClientRect(); return e.clientX > r.left && e.clientX < r.right && e.clientY > r.top && e.clientY < r.bottom; };
  [...document.querySelectorAll('#qface .fdot')].forEach(d => {
    let drag = null;
    d.onpointerdown = e => {
      if (locked) return;
      try { d.setPointerCapture(e.pointerId); } catch (err) { }
      drag = { sx: e.clientX, sy: e.clientY, moved: false }; d.classList.add('lift');
    };
    d.onpointermove = e => {
      if (!drag) return;
      const sc = window._sc || 1, dx = (e.clientX - drag.sx) / sc, dy = (e.clientY - drag.sy) / sc;
      if (Math.abs(dx) + Math.abs(dy) > 6) drag.moved = true;
      d.style.transform = `translate(${dx}px,${dy}px)`;
    };
    d.onpointerup = e => {
      if (!drag) return;
      const moved = drag.moved; drag = null;
      d.classList.remove('lift'); d.style.transform = '';
      let to = null;
      if (moved) to = hit(e, A) ? A : hit(e, B) ? B : hit(e, src) ? src : null;
      else to = src.contains(d) ? A : src;              // 탭: 위→왼쪽 상자 / 아래→위로 되돌리기
      if (!to || to === d.parentNode) return;
      to.appendChild(d);
      d.animate([{ transform: 'scale(1.35)' }, { transform: 'scale(1)' }], { duration: 200 });
      tick();
      freeUpdate();
    };
    d.onpointercancel = () => { drag = null; d.classList.remove('lift'); d.style.transform = ''; };
  });
  freeUpdate();
}
function freeUpdate() {
  const p = session.items[session.idx];
  const A = $('gA'), B = $('gB');
  /* 담긴 곳에 따라 색: 왼쪽=연두, 오른쪽·위=빨강 (숫자 색과 짝지어 한눈에) */
  [...document.querySelectorAll('#qface .fdot')].forEach(d => d.classList.toggle('gv', A.contains(d)));
  const a = A.querySelectorAll('.fdot').length, b = B.querySelectorAll('.fdot').length;
  $('fa').textContent = a; $('fb').textContent = b;
  $('fsent').innerHTML = `${p.n}${josaEun(p.n)} <b class="ga">${a}</b>${josaGwa(a)} <b class="gb">${b}</b>${josaRo(b)} 가를 수 있어요.`;
  if (locked || $('gC').querySelectorAll('.fdot').length) return;     // 위가 비어야 완료
  if (!a || !b) { speakFast('양쪽에 나누어 담아요.'); return; }        // 한쪽이 0이면 가르기가 아님
  locked = true;
  chime(true); celebrate($('gA'));
  logItem(); session.idx++; saveResume();
  let done = false;
  const go = () => { if (done) return; done = true; if (session.idx >= session.items.length) finishSession(); else renderProblem(); };
  speak(`${p.n}${josaEun(p.n)} ${a}${josaGwa(a)} ${b}${josaRo(b)} 가를 수 있어요. ` + praise(), () => setTimeout(go, 700));
  setTimeout(go, foreignPraise() ? 11000 : 7000);   // 보루(발화 끝 이벤트가 안 올 때만)
}
function hintFree(p, h, stage) {
  h.innerHTML = `<div class="tip">동그라미를 <b>아래 두 상자에 나누어</b> 담아요. 어떻게 나눠도 좋아요.</div>`;
  speak('동그라미를 아래 두 상자에 나누어 담아요. 어떻게 나눠도 좋아요.');
  if (stage < 2) return;
  /* 2차: 한 개를 대신 옮겨 시범 */
  const d = $('gC').querySelector('.fdot'); if (!d) return;
  setTimeout(() => { $('gA').appendChild(d); d.animate([{ transform: 'scale(1.4)' }, { transform: 'scale(1)' }], { duration: 240 }); freeUpdate(); }, 700);
}

(async function () {
  fitStage();
  flushQueue();
  probeHintLv();
  /* PWA: 배포판(https)에서만 서비스워커 등록 — 로컬 file://·개발 서버는 제외 */
  if ('serviceWorker' in navigator && location.protocol === 'https:')
    navigator.serviceWorker.register('sw.js').catch(() => { });
  /* 초대 링크(?code=ABC123): 교실 코드 자동 입력 — 소비 후 URL에서 제거(이후 교실 변경과 충돌 방지) */
  const invited = new URLSearchParams(location.search).get('code');
  if (invited && /^[A-Z0-9]{6}$/i.test(invited)) {
    device.classCode = invited.toUpperCase(); saveDevice();
    try { history.replaceState(null, '', location.pathname); } catch (e) { }
  }
  if (device.classCode) {
    klass = await Store.getClass(device.classCode);
    if (klass) { renderStudentPick(); return; }
  }
  renderStart();
})();
